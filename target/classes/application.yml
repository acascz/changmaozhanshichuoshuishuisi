server:
  port: 8080
  address: localhost

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/mung_bean_cake_mall?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&connectionCollation=utf8mb4_general_ci
    username: ******  # 数据库用户名，请根据实际情况修改
    password: ******  # 数据库密码，请根据实际情况修改
  redis:
    host: ******  # Redis 服务器地址，请根据实际情况修改
    port: 6379
    password: ******  # Redis 密码，请根据实际情况修改
    database: 0
    lettuce:
      pool:
        max-active: 50
        max-idle: 20
        min-idle: 5
        max-wait: 3000

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.pdd.mall.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# 图片上传配置
app:
  image:
    upload-dir: uploads

logging:
  level:
    com.pdd.mall: debug

# JWT 配置
jwt:
  secret: ******
  expiration: 1800000              # Access Token 过期时间：30 分钟
  refresh-expiration: 604800000    # Refresh Token 过期时间：7 天

# 物流 API 配置
logistics:
  api:
    enabled: false  # 是否启用物流 API 自动拉取
    kuaidi100:
      customer: ******     # 快递 100 客户 ID，请根据实际情况修改
      key: ******          # 快递 100 API Key，请根据实际情况修改

# 第三方登录配置
# ⭐ 重要提示：
# 1. 生产环境请使用环境变量或配置中心管理密钥
# 2. 不要将真实密钥提交到代码仓库
# 3. 验证机制必须保留，不能跳过
third-party:
  login:
    # QQ 互联配置
    # 获取地址：https://connect.qq.com/
    qq:
      app-id: "****"           # 填写你的 QQ 互联 AppID
      app-key: "****"          # 填写你的 QQ 互联 AppKey
      redirect-uri: "http://localhost:8080/api/auth/qq/callback"
    
    # 微信开放平台配置
    # 获取地址：https://open.weixin.qq.com/
    wechat:
      app-id: "****"           # 填写你的微信开放平台 AppID
      app-secret: "****"       # 填写你的微信开放平台 AppSecret
      redirect-uri: "http://localhost:8080/api/auth/wechat/callback"
    
    # 邮箱 SMTP 配置
    # 说明：用于发送验证码邮件
    email:
      smtp-host: "smtp.qq.com"
      smtp-port: 465           # SSL 端口：465, TLS 端口：587
      from-email: "****"       # 发件人邮箱
      password: "****"         # SMTP 授权码（不是邮箱登录密码）
      ssl-enabled: true
      code-expire-minutes: 5   # 验证码有效期（分钟）
      email-subject: "绿豆糕商城验证码"
      email-signature: "【绿豆糕商城】"
