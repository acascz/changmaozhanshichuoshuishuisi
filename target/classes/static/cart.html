<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0">
    <title>购物车 - 拼多多绿豆糕商城</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "PingFang SC", "Helvetica Neue", sans-serif;
            background: #FDFBF5;
            max-width: 414px;
            margin: 0 auto;
            padding-bottom: 60px;
            color: #5A4B40;
        }

        /* 顶部导航 */
        .top-bar {
            background: #fff;
            padding: 12px 15px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #F0EBE4;
            position: sticky;
            top: 0;
            z-index: 90;
        }
        .top-title {
            flex: 1;
            text-align: center;
            font-size: 16px;
            color: #5A4B40;
            font-weight: 500;
        }

        /* 优惠券栏 */
        .coupon-bar {
            background: #fff;
            margin: 5px 0;
            padding: 10px 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-radius: 8px;
            margin: 8px 10px;
        }
        .coupon-img {
            width: 60px;
            height: 60px;
            border-radius: 6px;
            overflow: hidden;
        }
        .coupon-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .coupon-info {
            flex: 1;
        }
        .coupon-desc {
            font-size: 13px;
            color: #5A4B40;
            margin-bottom: 3px;
        }
        .coupon-time {
            font-size: 11px;
            color: #948678;
        }
        .coupon-btn {
            background: #A1C895;
            color: #fff;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
        }

        /* 商品列表容器 */
        .goods-list {
            margin: 0 10px 10px;
        }

        /* 店铺栏 */
        .shop-bar {
            background: #fff;
            padding: 10px 15px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-radius: 8px 8px 0 0;
        }
        .check-box {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: 1px solid #D9D2C8;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .check-box.checked {
            background: #A1C895;
            border-color: #A1C895;
            color: #fff;
        }
        .shop-name {
            font-size: 14px;
            color: #5A4B40;
        }
        .shop-tag {
            font-size: 10px;
            color: #fff;
            background: #A1C895;
            padding: 1px 4px;
            border-radius: 2px;
            margin-right: 5px;
        }

        /* 商品项 */
        .goods-item {
            background: #fff;
            padding: 10px 15px;
            display: flex;
            align-items: flex-start;
            gap: 10px;
            border-top: 1px solid #F0EBE4;
        }
        .goods-item-img {
            width: 80px;
            height: 80px;
            border-radius: 6px;
            background: #F8F5EE;
            overflow: hidden;
        }
        .goods-item-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .goods-item-info {
            flex: 1;
        }
        .goods-item-name {
            font-size: 14px;
            color: #5A4B40;
            line-height: 1.4;
            margin-bottom: 5px;
        }
        .goods-item-spec {
            font-size: 12px;
            color: #948678;
            margin-bottom: 8px;
        }
        .goods-item-price {
            font-size: 16px;
            color: #A1C895;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .goods-item-tag {
            font-size: 12px;
            color: #A1C895;
            text-align: right;
        }
        .goods-item-tag a {
            color: #A1C895;
            text-decoration: none;
        }

        /* 商品操作 */
        .goods-item-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
        }
        .quantity-control {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .quantity-btn {
            width: 25px;
            height: 25px;
            border: 1px solid #D9D2C8;
            background: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .quantity-input {
            width: 30px;
            height: 25px;
            border: 1px solid #D9D2C8;
            text-align: center;
            border-radius: 4px;
        }
        .delete-btn {
            color: #948678;
            font-size: 12px;
            cursor: pointer;
        }

        /* 底部结算栏 */
        .settle-bar {
            position: fixed;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            width: 414px;
            height: 50px;
            background: #fff;
            display: flex;
            align-items: center;
            padding: 0 15px;
            border-top: 1px solid #F0EBE4;
            z-index: 90;
        }
        .settle-check {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
            color: #5A4B40;
        }
        .settle-price {
            flex: 1;
            text-align: right;
            padding-right: 10px;
        }
        .settle-price-text {
            font-size: 12px;
            color: #948678;
        }
        .settle-price-num {
            font-size: 18px;
            color: #A1C895;
            font-weight: bold;
        }
        .settle-btn {
            background: #A1C895;
            color: #fff;
            border: none;
            width: 120px;
            height: 100%;
            font-size: 15px;
            border-radius: 0;
            cursor: pointer;
        }

        /* 空购物车 */
        .empty-cart {
            text-align: center;
            padding: 100px 20px;
            color: #948678;
        }
        .empty-cart-icon {
            font-size: 60px;
            margin-bottom: 20px;
        }
        .empty-cart-text {
            font-size: 14px;
            margin-bottom: 20px;
        }
        .empty-cart-btn {
            background: #A1C895;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
        }

        /* 加载状态 */
        .loading {
            text-align: center;
            padding: 50px;
            color: #999;
            font-size: 14px;
        }
    </style>
</head>
<body>

<!-- 顶部导航 -->
<div class="top-bar">
    <div class="top-title">购物车</div>
</div>

<!-- 加载状态 -->
<div id="loading" class="loading">加载中...</div>

<!-- 购物车内容 -->
<div id="cartContent" style="display: none;">
    <!-- 优惠券栏 -->
    <div class="coupon-bar">
        <div class="coupon-img">
            <img src="/images/product/product1.jpg" alt="绿豆糕优惠券">
        </div>
        <div class="coupon-info">
            <div class="coupon-desc">满25元减13元，限时可用</div>
            <div class="coupon-time">有效期至2026-12-31</div>
        </div>
        <button class="coupon-btn">立即使用</button>
    </div>

    <!-- 商品列表 -->
    <div class="goods-list" id="cartItems">
        <!-- 商品项将通过JavaScript动态生成 -->
    </div>

    <!-- 空购物车状态 -->
    <div id="emptyCart" class="empty-cart" style="display: none;">
        <div class="empty-cart-icon">🛒</div>
        <div class="empty-cart-text">购物车还是空的</div>
        <button class="empty-cart-btn" onclick="window.location.href='/'">去逛逛</button>
    </div>

    <!-- 底部结算栏 -->
    <div class="settle-bar" id="settleBar" style="display: none;">
        <div class="settle-check">
            <div class="check-box" id="selectAll">✓</div>
            <div>全选</div>
        </div>
        <div class="settle-price">
            <div class="settle-price-text">合计：</div>
            <div class="settle-price-num" id="totalPrice">¥0.00</div>
        </div>
        <button class="settle-btn" id="settleBtn">去结算(0)</button>
    </div>
</div>

<script>
    let cartItems = [];
    let selectedItems = new Set();

    // 加载购物车数据
    function loadCart() {
        cartItems = JSON.parse(localStorage.getItem('pdd_cart') || '[]');
        renderCart();
    }

    // 渲染购物车
    function renderCart() {
        const loading = document.getElementById('loading');
        const cartContent = document.getElementById('cartContent');
        const cartItemsContainer = document.getElementById('cartItems');
        const emptyCart = document.getElementById('emptyCart');
        const settleBar = document.getElementById('settleBar');

        loading.style.display = 'none';
        cartContent.style.display = 'block';

        if (cartItems.length === 0) {
            emptyCart.style.display = 'block';
            settleBar.style.display = 'none';
            cartItemsContainer.innerHTML = '';
            return;
        }

        emptyCart.style.display = 'none';
        settleBar.style.display = 'flex';

        // 清空容器
        cartItemsContainer.innerHTML = '';

        // 按店铺分组
        const shopGroups = {};
        cartItems.forEach((item, index) => {
            const shopName = '臻欣绿豆糕官方店';
            if (!shopGroups[shopName]) {
                shopGroups[shopName] = [];
            }
            shopGroups[shopName].push({...item, index});
        });

        // 渲染每个店铺的商品
        Object.entries(shopGroups).forEach(([shopName, items]) => {
            const shopBar = document.createElement('div');
            shopBar.className = 'shop-bar';
            shopBar.innerHTML = `
                <div class="check-box" onclick="toggleShopSelection('${shopName}')">✓</div>
                <div class="shop-name"><span class="shop-tag">臻欣自营</span>${shopName}</div>
            `;
            cartItemsContainer.appendChild(shopBar);

            // 渲染店铺下的商品
            items.forEach(item => {
                const goodsItem = document.createElement('div');
                goodsItem.className = 'goods-item';
                goodsItem.innerHTML = `
                    <div class="check-box" onclick="toggleItemSelection(${item.index})">✓</div>
                    <div class="goods-item-img">
                        <img src="${item.image}" alt="${item.productName}">
                    </div>
                    <div class="goods-item-info">
                        <div class="goods-item-name">${item.productName}</div>
                        <div class="goods-item-spec">规格：${item.taste}·${item.spec} ×${item.quantity}</div>
                        <div class="goods-item-price">¥${item.price}</div>
                        <div class="goods-item-actions">
                            <div class="quantity-control">
                                <div class="quantity-btn" onclick="changeQuantity(${item.index}, -1)">-</div>
                                <input type="text" class="quantity-input" value="${item.quantity}" onchange="updateQuantity(${item.index}, this.value)">
                                <div class="quantity-btn" onclick="changeQuantity(${item.index}, 1)">+</div>
                            </div>
                            <div class="delete-btn" onclick="removeItem(${item.index})">删除</div>
                        </div>
                    </div>
                `;
                cartItemsContainer.appendChild(goodsItem);
            });
        });

        updateSettleBar();
    }

    // 切换商品选中状态
    function toggleItemSelection(index) {
        const checkBox = document.querySelectorAll('.goods-item .check-box')[index];
        checkBox.classList.toggle('checked');
        
        if (checkBox.classList.contains('checked')) {
            selectedItems.add(index);
        } else {
            selectedItems.delete(index);
        }
        
        updateSettleBar();
    }

    // 切换店铺选中状态
    function toggleShopSelection(shopName) {
        // 实现店铺全选/反选逻辑
        updateSettleBar();
    }

    // 修改商品数量
    function changeQuantity(index, delta) {
        const newQuantity = cartItems[index].quantity + delta;
        if (newQuantity >= 1) {
            updateQuantity(index, newQuantity);
        }
    }

    // 更新商品数量
    function updateQuantity(index, newQuantity) {
        newQuantity = parseInt(newQuantity) || 1;
        if (newQuantity < 1) newQuantity = 1;
        
        cartItems[index].quantity = newQuantity;
        localStorage.setItem('pdd_cart', JSON.stringify(cartItems));
        renderCart();
    }

    // 删除商品
    function removeItem(index) {
        cartItems.splice(index, 1);
        localStorage.setItem('pdd_cart', JSON.stringify(cartItems));
        selectedItems.delete(index);
        renderCart();
    }

    // 更新结算栏
    function updateSettleBar() {
        const totalPrice = document.getElementById('totalPrice');
        const settleBtn = document.getElementById('settleBtn');
        
        let total = 0;
        let selectedCount = 0;
        
        selectedItems.forEach(index => {
            const item = cartItems[index];
            total += item.price * item.quantity;
            selectedCount++;
        });
        
        totalPrice.textContent = `¥${total.toFixed(2)}`;
        settleBtn.textContent = `去结算(${selectedCount})`;
    }

    // 全选/反选
    document.getElementById('selectAll').addEventListener('click', function() {
        this.classList.toggle('checked');
        
        if (this.classList.contains('checked')) {
            // 全选
            selectedItems.clear();
            cartItems.forEach((_, index) => {
                selectedItems.add(index);
            });
        } else {
            // 反选
            selectedItems.clear();
        }
        
        // 更新所有复选框状态
        document.querySelectorAll('.check-box').forEach(box => {
            box.classList.toggle('checked', this.classList.contains('checked'));
        });
        
        updateSettleBar();
    });

    // 结算按钮点击事件
    document.getElementById('settleBtn').addEventListener('click', function() {
        if (selectedItems.size === 0) {
            alert('请选择要结算的商品');
            return;
        }
        
        // 保存选中的商品到订单
        const selectedOrderItems = [];
        selectedItems.forEach(index => {
            selectedOrderItems.push(cartItems[index]);
        });
        
        localStorage.setItem('pdd_selected_order', JSON.stringify(selectedOrderItems));
        window.location.href = '/checkout.html';
    });

    // 页面加载完成后执行
    document.addEventListener('DOMContentLoaded', function() {
        loadCart();
    });
</script>

</body>
</html>
