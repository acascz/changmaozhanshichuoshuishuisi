<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>添加好友</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "PingFang SC", "Helvetica Neue", sans-serif;
            background: #FDFBF5;
            max-width: 414px;
            margin: 0 auto;
            min-height: 100vh;
        }

        /* 顶部导航栏 */
        .nav-bar {
            height: 44px;
            background: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            border-bottom: 1px solid #f0f0f0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-back {
            font-size: 18px;
            color: #5A4B40;
            cursor: pointer;
        }

        .nav-title {
            font-size: 16px;
            font-weight: 600;
            color: #5A4B40;
        }

        /* 搜索框 */
        .search-section {
            background: white;
            padding: 15px;
            margin: 10px;
            border-radius: 10px;
        }

        .search-box {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #f5f5f5;
            padding: 8px 12px;
            border-radius: 8px;
        }

        .search-icon {
            font-size: 18px;
        }

        .search-input {
            flex: 1;
            border: none;
            background: transparent;
            font-size: 14px;
            outline: none;
        }

        .search-btn {
            background: #A1C895;
            color: white;
            border: none;
            padding: 6px 15px;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
        }

        /* 好友申请列表 */
        .requests-section {
            background: white;
            margin: 10px;
            border-radius: 10px;
            overflow: hidden;
        }

        .section-title {
            padding: 15px;
            font-size: 14px;
            font-weight: 600;
            color: #666;
            border-bottom: 1px solid #f5f5f5;
        }

        .request-item {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            border-bottom: 1px solid #f5f5f5;
            transition: background 0.2s;
        }

        .request-item:hover {
            background: #fafafa;
        }

        .request-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin-right: 12px;
            flex-shrink: 0;
        }

        .request-info {
            flex: 1;
            overflow: hidden;
        }

        .request-name {
            font-size: 15px;
            font-weight: 500;
            color: #333;
            margin-bottom: 4px;
        }

        .request-message {
            font-size: 13px;
            color: #999;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .request-actions {
            display: flex;
            gap: 8px;
        }

        .btn-accept {
            background: #A1C895;
            color: white;
            border: none;
            padding: 6px 15px;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
        }

        .btn-reject {
            background: #f5f5f5;
            color: #666;
            border: none;
            padding: 6px 15px;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
        }

        /* Toast 提示 */
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 1000;
        }

        .toast.show {
            opacity: 1;
        }
    </style>
</head>
<body>
    <!-- 顶部导航栏 -->
    <div class="nav-bar">
        <div class="nav-left">
            <span class="nav-back" onclick="backToChat()">←</span>
            <span class="nav-title">添加好友</span>
        </div>
    </div>

    <!-- 搜索框 -->
    <div class="search-section">
        <div class="search-box">
            <span class="search-icon">🔍</span>
            <input type="text" class="search-input" id="searchInput" placeholder="搜索用户 ID 或昵称">
            <button class="search-btn" onclick="searchUser()">搜索</button>
        </div>
    </div>

    <!-- 好友申请列表 -->
    <div class="requests-section">
        <div class="section-title">新的朋友</div>
        <div id="requestsList">
            <!-- 好友申请将在这里动态加载 -->
        </div>
    </div>

    <!-- Toast 提示 -->
    <div class="toast" id="toast"></div>

    <script>
        let currentUserId = localStorage.getItem('userId') || 1;

        // 返回聊天页面
        function backToChat() {
            window.location.href = 'index.html';
        }

        // 搜索用户
        function searchUser() {
            const keyword = document.getElementById('searchInput').value.trim();
            if (!keyword) {
                showToast('请输入搜索内容');
                return;
            }

            // TODO: 调用后端 API 搜索用户
            showToast('搜索功能开发中...');
        }

        // 加载好友申请列表
        function loadRequests() {
            // TODO: 调用后端 API 加载好友申请
            // 这里先使用模拟数据
            const requests = [
                { id: 1, name: '张三', message: '你好，我是张三', avatar: '👤' },
                { id: 2, name: '李四', message: '朋友推荐', avatar: '👤' }
            ];

            const container = document.getElementById('requestsList');
            container.innerHTML = requests.map(request => `
                <div class="request-item">
                    <div class="request-avatar">${request.avatar}</div>
                    <div class="request-info">
                        <div class="request-name">${request.name}</div>
                        <div class="request-message">${request.message}</div>
                    </div>
                    <div class="request-actions">
                        <button class="btn-reject" onclick="rejectRequest(${request.id})">拒绝</button>
                        <button class="btn-accept" onclick="acceptRequest(${request.id})">接受</button>
                    </div>
                </div>
            `).join('');
        }

        // 接受好友请求
        function acceptRequest(requestId) {
            // TODO: 调用后端 API 接受好友请求
            showToast('已接受好友请求');
            loadRequests();
        }

        // 拒绝好友请求
        function rejectRequest(requestId) {
            // TODO: 调用后端 API 拒绝好友请求
            showToast('已拒绝好友请求');
            loadRequests();
        }

        // Toast 提示
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        // 页面加载
        document.addEventListener('DOMContentLoaded', () => {
            loadRequests();
        });
    </script>
</body>
</html>
