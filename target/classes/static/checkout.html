<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0">
    <title>确认订单 - 手工绿豆糕商城</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "PingFang SC", "Helvetica Neue", sans-serif;
            background: #FDFBF5;
            max-width: 414px;
            margin: 0 auto;
            padding-bottom: 70px;
            color: #5A4B40;
        }

        /* 顶部导航 */
        .order-header {
            background: #fff;
            padding: 12px 15px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #F0EBE4;
            position: sticky;
            top: 0;
            z-index: 90;
        }
        .back-btn {
            font-size: 18px;
            color: #5A4B40;
            cursor: pointer;
        }
        .header-title {
            flex: 1;
            text-align: center;
            font-size: 16px;
            font-weight: 500;
        }

        /* 地址栏 */
        .address-box {
            background: #fff;
            margin: 8px 10px;
            padding: 15px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .address-tag {
            font-size: 11px;
            color: #fff;
            background: #A1C895;
            padding: 2px 6px;
            border-radius: 3px;
            margin-right: 5px;
        }
        .address-info {
            flex: 1;
        }
        .address-name {
            font-size: 15px;
            font-weight: 500;
            margin-bottom: 5px;
        }
        .address-detail {
            font-size: 13px;
            color: #948678;
        }
        .address-arrow {
            font-size: 16px;
            color: #948678;
        }

        /* 店铺栏 */
        .shop-box {
            background: #fff;
            margin: 0 10px;
            padding: 12px 15px;
            border-radius: 8px 8px 0 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .shop-tag {
            font-size: 10px;
            color: #fff;
            background: #A1C895;
            padding: 1px 4px;
            border-radius: 2px;
            margin-right: 5px;
        }
        .shop-name {
            font-size: 14px;
            font-weight: 500;
        }

        /* 商品项 */
        .goods-box {
            background: #fff;
            margin: 0 10px;
            padding: 12px 15px;
            border-top: 1px solid #F0EBE4;
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }
        .goods-img {
            width: 70px;
            height: 70px;
            border-radius: 6px;
            background: #F8F5EE;
            overflow: hidden;
        }
        .goods-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .goods-info {
            flex: 1;
        }
        .goods-name {
            font-size: 14px;
            line-height: 1.4;
            margin-bottom: 5px;
        }
        .goods-spec {
            font-size: 12px;
            color: #948678;
            margin-bottom: 8px;
        }
        .goods-price {
            font-size: 16px;
            color: #A1C895;
            font-weight: bold;
        }
        .goods-count {
            font-size: 13px;
            color: #948678;
        }
        .goods-tip {
            font-size: 11px;
            color: #A1C895;
            border: 1px solid #A1C895;
            padding: 2px 4px;
            border-radius: 2px;
            display: inline-block;
            margin-top: 5px;
        }

        /* 配送/留言栏 */
        .info-row {
            background: #fff;
            margin: 0 10px;
            padding: 12px 15px;
            border-top: 1px solid #F0EBE4;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .info-row:last-of-type {
            border-radius: 0 0 8px 8px;
            margin-bottom: 8px;
        }
        .info-label {
            font-size: 14px;
        }
        .info-value {
            font-size: 13px;
            color: #948678;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .info-arrow {
            font-size: 14px;
            color: #948678;
        }

        /* 底部支付栏 */
        .pay-bar {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 414px;
            height: 60px;
            background: #fff;
            display: flex;
            align-items: center;
            padding: 0 15px;
            border-top: 1px solid #F0EBE4;
            z-index: 99;
        }
        .pay-total {
            flex: 1;
            text-align: right;
            margin-right: 10px;
        }
        .pay-total-text {
            font-size: 12px;
            color: #948678;
        }
        .pay-total-num {
            font-size: 18px;
            color: #A1C895;
            font-weight: bold;
        }
        .pay-actions {
            display: flex;
            gap: 10px;
        }
        .pay-btn {
            border: none;
            height: 40px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            border-radius: 4px;
            padding: 0 15px;
        }
        .pay-btn.secondary {
            background: #fff;
            color: #948678;
            border: 1px solid #D9D2C8;
        }
        .pay-btn.primary {
            background: #A1C895;
            color: #fff;
        }
    </style>
</head>
<body>

<!-- 顶部导航 -->
<div class="order-header">
    <div class="back-btn" onclick="goBack()">←</div>
    <div class="header-title">确认订单</div>
</div>

<!-- 地址栏 -->
<div class="address-box" id="addressSection">
    <!-- 地址信息将通过JavaScript动态生成 -->
</div>

<!-- 店铺栏 -->
<div class="shop-box">
    <span class="shop-tag">臻欣自营</span>
    <div class="shop-name">臻欣绿豆糕官方店</div>
</div>

<!-- 商品项 -->
<div id="orderItems">
    <!-- 商品项将通过JavaScript动态生成 -->
</div>

<!-- 配送信息 -->
<div class="info-row">
    <div class="info-label">配送</div>
    <div class="info-value">
        <span>京东快递</span>
        <span class="info-arrow">></span>
    </div>
</div>
<div class="info-row">
    <div class="info-label"></div>
    <div class="info-value">预计3月21日(周六)送达</div>
</div>

<!-- 留言 -->
<div class="info-row">
    <div class="info-label">留言</div>
    <div class="info-value">
        <span>建议留言前先与商家沟通确认</span>
        <span class="info-arrow">></span>
    </div>
</div>

<!-- 底部支付栏 -->
        <div class="pay-bar">
            <div class="pay-total">
                <div class="pay-total-text">合计：</div>
                <div class="pay-total-num" id="totalPrice">¥0.00</div>
            </div>
            <div class="pay-actions">
                <button class="pay-btn secondary" id="saveOrderBtn">稍后支付</button>
                <button class="pay-btn primary" id="payBtn">立即支付 ¥0.00</button>
            </div>
        </div>

<script>
    let orderItems = [];
    let totalAmount = 0;

    // 加载用户数据
    function loadUserData() {
        // 从localStorage获取用户数据，如果没有则使用默认数据
        const userData = JSON.parse(localStorage.getItem('pdd_user_info') || '{}');
        
        // 默认用户数据（如果用户没有设置）
        const defaultUserData = {
            name: '周',
            phone: '151****1051',
            address: '陕西国际商贸学院北区11号学生公寓小铁门',
            tags: ['默认', '学校']
        };
        
        // 合并用户数据
        const userInfo = {...defaultUserData, ...userData};
        
        // 渲染地址信息
        renderAddress(userInfo);
    }

    // 加载订单数据
    function loadOrder() {
        // 从localStorage获取订单数据
        const orderData = JSON.parse(localStorage.getItem('pdd_selected_order') || '[]');
        
        if (orderData.length === 0) {
            // 如果没有订单数据，可能是从立即购买过来的
            const buyNowData = JSON.parse(localStorage.getItem('pdd_buy_now') || '[]');
            if (buyNowData.length > 0) {
                orderItems = buyNowData;
            } else {
                // 如果都没有数据，显示空订单
                showEmptyOrder();
                return;
            }
        } else {
            orderItems = orderData;
        }
        
        renderOrder();
    }

    // 渲染地址信息
    function renderAddress(userInfo) {
        const addressSection = document.getElementById('addressSection');
        
        // 生成标签HTML
        const tagsHtml = userInfo.tags.map(tag => 
            `<span class="address-tag">${tag}</span>`
        ).join('');
        
        addressSection.innerHTML = `
            <div>${tagsHtml}</div>
            <div class="address-info">
                <div class="address-name">${userInfo.address} ${userInfo.name} ${userInfo.phone}</div>
                <div class="address-detail">点击修改地址</div>
            </div>
            <div class="address-arrow">></div>
        `;
    }

    // 渲染订单
    function renderOrder() {
        const orderItemsContainer = document.getElementById('orderItems');
        const totalPriceElement = document.getElementById('totalPrice');
        const payBtn = document.getElementById('payBtn');
        
        // 清空容器
        orderItemsContainer.innerHTML = '';
        
        // 计算总金额
        totalAmount = 0;
        
        // 渲染每个商品
        orderItems.forEach(item => {
            const goodsBox = document.createElement('div');
            goodsBox.className = 'goods-box';
            goodsBox.innerHTML = `
                <div class="goods-img">
                    <img src="${item.image}" alt="${item.productName}">
                </div>
                <div class="goods-info">
                    <div class="goods-name">${item.productName}</div>
                    <div class="goods-spec">规格：${item.taste}·${item.weight}·${item.sugar}·${item.coldChain}</div>
                    <div class="goods-price">¥${item.price} <span class="goods-count">×${item.quantity}</span></div>
                    <div class="goods-tip">支持7天无理由退货</div>
                </div>
            `;
            orderItemsContainer.appendChild(goodsBox);
            
            // 累加金额
            totalAmount += item.price * item.quantity;
        });
        
        // 更新总金额
        totalPriceElement.textContent = `¥${totalAmount.toFixed(2)}`;
        payBtn.textContent = `立即支付 ¥${totalAmount.toFixed(2)}`;
    }

    // 显示空订单
    function showEmptyOrder() {
        const orderItemsContainer = document.getElementById('orderItems');
        orderItemsContainer.innerHTML = `
            <div class="goods-box">
                <div class="goods-info">
                    <div class="goods-name">订单为空</div>
                    <div class="goods-spec">请返回重新选择商品</div>
                </div>
            </div>
        `;
    }

    // 返回上一页 - 智能判断返回路径
    function goBack() {
        // 检查是否从商品详情页跳转过来
        if (document.referrer.includes('product-detail.html') && !document.referrer.includes('checkout.html')) {
            // 从商品详情页返回（但不是从确认订单页），直接返回商品详情页
            window.location.href = document.referrer;
        } else if (document.referrer.includes('orders.html')) {
            // 从订单页面返回，直接返回订单页面
            window.location.href = '/orders.html';
        } else if (document.referrer.includes('index.html') || document.referrer.includes('checkout.html')) {
            // 从首页或确认订单页返回，直接返回首页（避免循环）
            window.location.href = '/index.html#homePage';
        } else {
            // 其他情况使用浏览器返回
            window.history.back();
        }
    }

    // 稍后支付按钮点击事件
    document.getElementById('saveOrderBtn').addEventListener('click', function() {
        if (orderItems.length === 0) {
            alert('订单为空，无法保存');
            return;
        }
        
        // 创建订单信息
        const orderInfo = {
            productName: orderItems[0].productName,
            taste: orderItems[0].taste,
            spec: orderItems[0].spec,
            price: parseFloat(orderItems[0].price),
            quantity: orderItems[0].quantity,
            image: orderItems[0].image
        };
        
        // 创建待付款订单
        const pendingOrder = {
            id: Date.now(),
            shopName: '臻欣绿豆糕官方店',
            shopTag: '臻欣自营',
            status: 'pending_payment',
            statusText: '待付款',
            productName: orderInfo.productName,
            spec: `规格：${orderInfo.taste}·${orderInfo.spec}`,
            price: orderInfo.price,
            quantity: orderInfo.quantity,
            total: totalAmount.toFixed(2),
            logistics: '',
            image: orderInfo.image,
            createTime: new Date().toISOString(),
            expireTime: new Date(Date.now() + 30 * 60 * 1000).toISOString() // 30分钟过期
        };
        
        // 保存到订单列表（待付款状态）
        let ordersData = JSON.parse(localStorage.getItem('pdd_orders') || '[]');
        ordersData.unshift(pendingOrder);
        localStorage.setItem('pdd_orders', JSON.stringify(ordersData));
        
        // 清空订单数据
        localStorage.removeItem('pdd_selected_order');
        localStorage.removeItem('pdd_buy_now');
        
        alert('订单已保存到待付款，请在30分钟内完成支付');
        
        // 返回商品详情页
        if (document.referrer.includes('product-detail.html')) {
            window.location.href = document.referrer;
        } else {
            // 如果无法确定来源，返回首页
            window.location.href = '/index.html#homePage';
        }
    });

    // 支付按钮点击事件
    document.getElementById('payBtn').addEventListener('click', function() {
        if (orderItems.length === 0) {
            alert('订单为空，无法支付');
            return;
        }
        
        // 创建订单信息
        const orderInfo = {
            productName: orderItems[0].productName,
            taste: orderItems[0].taste,
            spec: orderItems[0].spec,
            price: parseFloat(orderItems[0].price),
            quantity: orderItems[0].quantity,
            image: orderItems[0].image
        };
        
        // 先创建待付款订单
        const pendingOrder = {
            id: Date.now(),
            shopName: '臻欣绿豆糕官方店',
            shopTag: '臻欣自营',
            status: 'pending_payment',
            statusText: '待付款',
            productName: orderInfo.productName,
            spec: `规格：${orderInfo.taste}·${orderInfo.spec}`,
            price: orderInfo.price,
            quantity: orderInfo.quantity,
            total: totalAmount.toFixed(2),
            logistics: '',
            image: orderInfo.image,
            createTime: new Date().toISOString(),
            expireTime: new Date(Date.now() + 30 * 60 * 1000).toISOString()
        };
        
        // 保存到订单列表（先保存待付款订单）
        let ordersData = JSON.parse(localStorage.getItem('pdd_orders') || '[]');
        ordersData.unshift(pendingOrder);
        localStorage.setItem('pdd_orders', JSON.stringify(ordersData));
        
        // 模拟支付成功
        alert('支付成功！订单金额：¥' + totalAmount.toFixed(2));
        
        // 更新订单状态为待发货
        const orderId = pendingOrder.id;
        const updatedOrders = ordersData.map(order => {
            if (order.id === orderId) {
                return {
                    ...order,
                    status: 'pending_ship',
                    statusText: '待发货',
                    logistics: '商家正在备货中',
                    payTime: new Date().toISOString(),
                    shipTime: new Date(Date.now() + 24 * 60 * 60 * 1000).toISOString()
                };
            }
            return order;
        });
        
        // 保存更新后的订单列表
        localStorage.setItem('pdd_orders', JSON.stringify(updatedOrders));
        
        // 清空订单数据
        localStorage.removeItem('pdd_selected_order');
        localStorage.removeItem('pdd_buy_now');
        
        // 返回首页
        window.location.href = '/';
    });

    // 页面加载完成后执行
    document.addEventListener('DOMContentLoaded', function() {
        loadUserData();
        loadOrder();
    });
</script>

</body>
</html>
