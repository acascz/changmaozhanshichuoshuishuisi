<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0">
    <title>商品详情 - 手工绿豆糕商城</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "PingFang SC", "Helvetica Neue", sans-serif;
            background: #FDFBF5; /* 你的浅米白底色 */
            max-width: 414px;
            margin: 0 auto;
            padding-bottom: 70px;
            color: #333;
        }

        /* 顶部导航（你的风格） */
        .top-bar {
            background: #fff;
            padding: 12px 15px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #f0f0f0;
        }

        .back {
            font-size: 18px;
            color: #5A4B40; /* 你的暖棕 */
        }

        .top-title {
            flex: 1;
            text-align: center;
            font-size: 16px;
            color: #5A4B40;
            font-weight: 500;
        }

        .top-right {
            font-size: 14px;
            color: #5A4B40;
            display: flex;
            gap: 15px;
        }

        /* 商品图片（你的风格） */
        .goods-img {
            width: 100%;
            height: 320px;
            background: #F8F5EE;
            margin-top: 5px;
        }
        .goods-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 商品信息（你的风格） */
        .goods-info {
            background: #fff;
            margin: 10px 15px;
            border-radius: 10px;
            padding: 15px;
        }

        .goods-name {
            font-size: 16px;
            color: #5A4B40;
            font-weight: 500;
            line-height: 1.5;
            margin-bottom: 10px;
        }

        .goods-price {
            font-size: 20px;
            color: #A1C895; /* 你的豆绿色 */
            font-weight: bold;
            margin-bottom: 5px;
        }

        .goods-sale {
            font-size: 12px;
            color: #999;
        }

        /* 商品详情（你的风格） */
        .detail-box {
            background: #fff;
            margin: 0 15px;
            border-radius: 10px;
            padding: 18px 15px;
            line-height: 1.7;
            font-size: 14px;
            color: #5A4B40;
        }

        /* 底部购买栏（你的风格） */
        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 414px;
            height: 60px;
            background: #fff;
            display: flex;
            align-items: center;
            border-top: 1px solid #eee;
        }

        .bottom-left {
            width: 40%;
            display: flex;
        }

        .bottom-left .item {
            flex: 1;
            text-align: center;
            font-size: 11px;
            color: #5A4B40;
        }

        .bottom-right {
            width: 60%;
            display: flex;
            height: 100%;
        }

        .btn-cart {
            flex: 1;
            background: #F5F5F0;
            color: #5A4B40;
            border: none;
            font-size: 15px;
        }

        .btn-buy {
            flex: 1;
            background: #A1C895;
            color: #fff;
            border: none;
            font-size: 15px;
        }

        /* 复刻参考图的规格弹窗（适配你的配色） */
        .spec-popup {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 999;
            display: none;
        }
        .popup-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 400px;
            background: #fff;
            border-radius: 8px;
            padding: 15px;
        }
        /* 弹窗顶部：价格+关闭+数量（复刻布局+你的配色） */
        .popup-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }
        .popup-price-area {
            flex: 1;
        }
        .popup-price {
            font-size: 18px;
            color: #A1C895; /* 你的豆绿色（替换参考图红色） */
            font-weight: bold;
        }
        .popup-tip {
            font-size: 12px;
            color: #999;
            margin-top: 2px;
        }
        .popup-close {
            font-size: 20px;
            color: #999;
            cursor: pointer;
        }
        /* 数量加减（复刻参考图样式） */
        .num-control {
            display: flex;
            align-items: center;
            margin: 10px 0;
        }
        .num-btn {
            width: 30px;
            height: 30px;
            border: 1px solid #eee;
            background: #f5f5f5;
            text-align: center;
            line-height: 30px;
            cursor: pointer;
        }
        .num-input {
            width: 50px;
            height: 30px;
            border: 1px solid #eee;
            border-left: none;
            border-right: none;
            text-align: center;
            outline: none;
        }
        /* 规格分组标题（你的暖棕） */
        .spec-group-title {
            font-size: 14px;
            color: #5A4B40; /* 你的暖棕 */
            margin: 15px 0 8px 0;
            font-weight: 500;
        }
        /* 规格选项（复刻参考图样式+你的配色） */
        .spec-options {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .spec-option {
            padding: 10px 15px;
            background: #f9f9f9;
            border-radius: 4px;
            font-size: 13px;
            color: #5A4B40; /* 你的暖棕 */
            cursor: pointer;
            border: 1px solid transparent;
        }
        .spec-option.active {
            border: 1px solid #A1C895; /* 你的豆绿色（替换参考图红色） */
            background: #E8F3E1; /* 豆绿色浅背景 */
            color: #A1C895;
            position: relative;
        }
        /* 参考图的小绿点（替换红点） */
        .spec-option.active::before {
            content: "●";
            color: #A1C895;
            font-size: 8px;
            margin-right: 5px;
        }
        /* 确定按钮（你的豆绿色） */
        .popup-confirm {
            width: 100%;
            height: 45px;
            background: #A1C895; /* 你的豆绿色 */
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<!-- 顶部导航 -->
<div class="top-bar">
    <div class="back" onclick="history.back()">←</div>
    <div class="top-title">商品详情</div>
    <div class="top-right">
        <span>客服</span>
        <span>收藏</span>
    </div>
</div>

<!-- 高清商品图片 -->
<div class="goods-img">
    <img src="https://picsum.photos/800/800" alt="绿豆冰沙馅">
</div>

<!-- 商品信息 -->
<div class="goods-info">
    <div class="goods-name">臻欣 绿豆冰沙馅 纯豆无添加 开袋即食 家用/烘焙店专用</div>
    <div class="goods-price">¥18.90</div>
    <div class="goods-sale">已售 2698+ 件</div>
</div>

<!-- 商品详情 -->
<div class="detail-box">
    精选优质脱皮绿豆，清洗浸泡、充分蒸煮后精细打沙，小火慢炒浓缩成型，不添加香精，还原绿豆本香。<br><br>
    馅料绵密细腻、无颗粒、不噎口，甜度适中不腻喉，软糯易塑形，冷藏后冰润清爽，口感更佳。<br><br>
    可直接压模制作绿豆冰糕、绿豆饼、桃山月饼等。开袋即用，省心省力，家用烘焙、店铺商用都合适。
</div>

<!-- 底部购买栏 -->
<div class="bottom-bar">
    <div class="bottom-left">
        <div class="item">客服</div>
        <div class="item">收藏</div>
    </div>
    <div class="bottom-right">
        <button class="btn-cart" onclick="showSpecPopup()">加入购物车</button>
        <button class="btn-buy" onclick="showSpecPopup()">立即购买</button>
    </div>
</div>

<!-- 1:1复刻参考图布局 + 你的内容/配色 -->
<div class="spec-popup" id="specPopup">
    <div class="popup-content">
        <!-- 弹窗顶部：价格+关闭 -->
        <div class="popup-top">
            <div class="popup-price-area">
                <div class="popup-price">¥18.90-58.90</div>
                <div class="popup-tip">请选择 规格</div>
            </div>
            <div class="popup-close" onclick="closeSpecPopup()">×</div>
        </div>

        <!-- 数量加减（复刻参考图） -->
        <div class="num-control">
            <div class="num-btn" onclick="changeNum('-')">-</div>
            <input type="text" class="num-input" value="1" id="goodsNum">
            <div class="num-btn" onclick="changeNum('+')">+</div>
        </div>

        <!-- 规格分组1：口味（你的产品内容） -->
        <div class="spec-group-title">口味</div>
        <div class="spec-options">
            <div class="spec-option" onclick="selectSpec(this)">原味</div>
            <div class="spec-option active" onclick="selectSpec(this)">● 桂花味</div>
            <div class="spec-option" onclick="selectSpec(this)">抹茶味</div>
        </div>

        <!-- 规格分组2：规格（你的产品内容） -->
        <div class="spec-group-title">规格</div>
        <div class="spec-options">
            <div class="spec-option active" onclick="selectSpec(this)">● 500克装</div>
            <div class="spec-option" onclick="selectSpec(this)">5公斤装</div>
        </div>

        <!-- 确定按钮（你的豆绿色） -->
        <button class="popup-confirm" onclick="closeSpecPopup()">确定</button>
    </div>
</div>

<script>
    // 显示弹窗
    function showSpecPopup() {
        document.getElementById('specPopup').style.display = 'block';
    }
    // 关闭弹窗
    function closeSpecPopup() {
        document.getElementById('specPopup').style.display = 'none';
    }
    // 数量加减
    function changeNum(type) {
        let numInput = document.getElementById('goodsNum');
        let num = parseInt(numInput.value);
        if (type === '+') {
            num += 1;
        } else {
            num = num > 1 ? num - 1 : 1;
        }
        numInput.value = num;
    }
    // 选中规格（高亮+小绿点）
    function selectSpec(el) {
        // 先取消同组所有选中
        let parent = el.parentElement;
        let siblings = parent.querySelectorAll('.spec-option');
        siblings.forEach(item => {
            item.classList.remove('active');
            item.innerHTML = item.innerHTML.replace('● ', '');
        });
        // 选中当前项
        el.classList.add('active');
        el.innerHTML = '● ' + el.innerHTML.replace('● ', '');
    }
</script>

</body>
</html>
