<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人信息</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        body {
            background-color: #f5f5f5;
        }
        /* 遮罩层 */
        .mask {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            display: none;
            z-index: 99;
        }
        /* 顶部导航栏 */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background-color: #fff;
            border-bottom: 1px solid #eee;
        }
        .header .back-btn {
            font-size: 20px;
            color: #333;
            text-decoration: none;
        }
        .header .title {
            font-size: 18px;
            font-weight: 500;
            color: #333;
        }
        .header .menu {
            display: flex;
            gap: 12px;
        }
        .header .menu-btn {
            font-size: 18px;
            color: #666;
        }
        /* 信息列表 */
        .info-list {
            margin-top: 8px;
            background-color: #fff;
        }
        .info-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px;
            border-bottom: 1px solid #f0f0f0;
        }
        .info-item:last-child {
            border-bottom: none;
        }
        .info-label {
            font-size: 17px;
            color: #333;
        }
        .info-value {
            display: flex;
            align-items: center;
            font-size: 17px;
            color: #666;
        }
        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
            cursor: pointer;
        }
        .nickname-input {
            border: none;
            outline: none;
            font-size: 17px;
            color: #666;
            text-align: right;
            width: 120px;
        }
        /* 更新按钮 */
        .update-btn {
            margin: 24px 16px;
            width: calc(100% - 32px);
            padding: 14px 0;
            background-color: #ff3b30;
            color: #fff;
            border: none;
            border-radius: 24px;
            font-size: 18px;
            font-weight: 500;
            cursor: pointer;
        }
        .update-btn:active {
            background-color: #e6352a;
        }
        /* 底部弹窗 */
        .bottom-sheet {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: #fff;
            border-radius: 12px 12px 0 0;
            padding: 20px 0;
            transform: translateY(100%);
            transition: transform 0.3s ease;
            z-index: 100;
        }
        .bottom-sheet.show {
            transform: translateY(0);
        }
        .sheet-item {
            padding: 16px;
            text-align: center;
            font-size: 17px;
            color: #333;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
        }
        .sheet-item:last-child {
            border-bottom: none;
            color: #666;
        }
        .sheet-item.wx-avatar {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .sheet-item.wx-avatar img {
            width: 32px;
            height: 32px;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <!-- 遮罩层 -->
    <div class="mask" id="mask"></div>

    <!-- 顶部导航 -->
    <div class="header">
        <a href="#" class="back-btn">←</a>
        <div class="title">个人信息</div>
        <div class="menu">
            <span class="menu-btn">⋯</span>
            <span class="menu-btn">⎼</span>
            <span class="menu-btn">⊚</span>
        </div>
    </div>

    <!-- 信息列表 -->
    <div class="info-list">
        <div class="info-item">
            <div class="info-label">头像</div>
            <div class="info-value">
                <img src="https://picsum.photos/200/200" alt="头像" class="avatar" id="avatar">
            </div>
        </div>
        <div class="info-item">
            <div class="info-label">昵称</div>
            <div class="info-value">
                <input type="text" class="nickname-input" value="Jay" id="nickname">
            </div>
        </div>
    </div>

    <!-- 更新按钮 -->
    <button class="update-btn" id="updateBtn">更新</button>

    <!-- 底部头像选择弹窗 -->
    <div class="bottom-sheet" id="avatarSheet">
        <div class="sheet-item wx-avatar">
            <span>用微信头像</span>
            <img src="https://picsum.photos/200/200" alt="微信头像">
        </div>
        <div class="sheet-item" id="albumBtn">从相册选择</div>
        <div class="sheet-item" id="cameraBtn">拍照</div>
        <div class="sheet-item" id="cancelBtn">取消</div>
    </div>

    <script>
        const mask = document.getElementById('mask');
        const avatar = document.getElementById('avatar');
        const avatarSheet = document.getElementById('avatarSheet');
        const cancelBtn = document.getElementById('cancelBtn');
        const updateBtn = document.getElementById('updateBtn');

        // 点击头像唤起弹窗
        avatar.addEventListener('click', () => {
            mask.style.display = 'block';
            avatarSheet.classList.add('show');
        });

        // 点击取消关闭弹窗
        cancelBtn.addEventListener('click', () => {
            mask.style.display = 'none';
            avatarSheet.classList.remove('show');
        });

        // 点击遮罩关闭弹窗
        mask.addEventListener('click', () => {
            mask.style.display = 'none';
            avatarSheet.classList.remove('show');
        });

        // 更新按钮逻辑（可对接后端）
        updateBtn.addEventListener('click', () => {
            const nickname = document.getElementById('nickname').value;
            alert(`更新成功！昵称：${nickname}`);
            // 这里可添加AJAX请求，将昵称和头像URL提交到后端接口
        });
    </script>
</body>
</html>
