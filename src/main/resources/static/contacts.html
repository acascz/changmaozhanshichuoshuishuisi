<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>通讯录</title>
    <link rel="stylesheet" href="css/chat-system.css">
    <style>
        .search-bar {
            padding: 10px;
            background: white;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .search-input-wrapper {
            display: flex;
            align-items: center;
            background: #F5F5F0;
            padding: 6px 12px;
            border-radius: 20px;
        }
        
        .search-input {
            flex: 1;
            border: none;
            background: none;
            outline: none;
            font-size: 14px;
            margin-left: 8px;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="page-container">
        <!-- 顶部导航栏 -->
        <div class="nav-bar">
            <div class="nav-left">
                <button class="nav-back" onclick="backToChat()">←</button>
            </div>
            <div class="nav-title">通讯录</div>
            <div class="nav-right">
                <button class="nav-btn" onclick="searchUser()">🔍</button>
            </div>
        </div>
        
        <!-- 搜索栏 -->
        <div class="search-bar">
            <div class="search-input-wrapper" onclick="searchUser()">
                <span>🔍</span>
                <input type="text" class="search-input" placeholder="搜索用户账号/IP" readonly>
            </div>
        </div>
        
        <!-- 标签页切换 -->
        <div class="tabs">
            <div class="tab-item active" data-tab="official" onclick="switchTab('official')">
                <span class="tab-icon">🎧</span>
                <span class="tab-text">官方客服</span>
            </div>
            <div class="tab-item" data-tab="friends" onclick="switchTab('friends')">
                <span class="tab-icon">👤</span>
                <span class="tab-text">好友</span>
            </div>
            <div class="tab-item" data-tab="groups" onclick="switchTab('groups')">
                <span class="tab-icon">👥</span>
                <span class="tab-text">群聊</span>
            </div>
            <div class="tab-item" data-tab="tools" onclick="switchTab('tools')">
                <span class="tab-icon">🛠️</span>
                <span class="tab-text">工具</span>
            </div>
        </div>
        
        <!-- 内容区域 -->
        <div class="content">
            <!-- 官方客服 -->
            <div class="tab-content active" id="tab-official">
                <div class="list-container" id="officialServiceList">
                    <div class="loading">
                        <div class="loading-spinner"></div>
                    </div>
                </div>
            </div>
            
            <!-- 好友列表 -->
            <div class="tab-content" id="tab-friends">
                <div class="list-container" id="friendsList">
                    <div class="loading">
                        <div class="loading-spinner"></div>
                    </div>
                </div>
            </div>
            
            <!-- 群聊列表 -->
            <div class="tab-content" id="tab-groups">
                <div class="list-container" id="groupsList">
                    <div class="loading">
                        <div class="loading-spinner"></div>
                    </div>
                </div>
            </div>
            
            <!-- 工具 -->
            <div class="tab-content" id="tab-tools">
                <div class="tools-grid">
                    <div class="tool-item" onclick="openAiAssistant()">
                        <span class="tool-icon">🤖</span>
                        <span class="tool-text">AI 助手</span>
                    </div>
                    <div class="tool-item" onclick="openServiceChat()">
                        <span class="tool-icon">💬</span>
                        <span class="tool-text">AI 客服</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // 当前用户 ID
        let currentUserId = localStorage.getItem('userId') || 1;
        
        // 返回聊天
        function backToChat() {
            window.location.href = 'index.html';
        }
        
        // 搜索用户
        function searchUser() {
            window.location.href = 'search-user.html';
        }
        
        // 切换标签页
        function switchTab(tab) {
            // 移除所有激活状态
            document.querySelectorAll('.tab-item').forEach(item => {
                item.classList.remove('active');
            });
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.remove('active');
            });
            
            // 激活当前标签
            document.querySelector(`.tab-item[data-tab="${tab}"]`).classList.add('active');
            document.getElementById(`tab-${tab}`).classList.add('active');
            
            // 加载对应数据
            loadTabData(tab);
        }
        
        // 加载标签页数据
        function loadTabData(tab) {
            switch(tab) {
                case 'official':
                    loadOfficialServices();
                    break;
                case 'friends':
                    loadFriendsList();
                    break;
                case 'groups':
                    loadGroupsList();
                    break;
            }
        }
        
        // 加载官方客服列表
        function loadOfficialServices() {
            const container = document.getElementById('officialServiceList');
            // 模拟客服数据（实际应从后端加载）
            const services = [
                { id: 1, name: '在线客服', status: 'online' },
                { id: 2, name: '电话客服', status: 'offline' },
                { id: 3, name: '投诉建议', status: 'online' }
            ];
            
            container.innerHTML = services.map(service => `
                <div class="list-item" onclick="openServiceChat(${service.id})">
                    <div class="list-avatar service">🎧</div>
                    <div class="list-info">
                        <div class="list-name">${service.name}</div>
                        <div class="list-status ${service.status}">${service.status === 'online' ? '在线' : '离线'}</div>
                    </div>
                </div>
            `).join('');
        }
        
        // 加载好友列表
        function loadFriendsList() {
            const container = document.getElementById('friendsList');
            
            fetch(`/api/friend/list?userId=${currentUserId}`)
                .then(response => response.json())
                .then(data => {
                    if (data.code === 200 && data.data && data.data.length > 0) {
                        container.innerHTML = data.data.map(friend => `
                            <div class="list-item" onclick="openFriendDetail(${friend.friendId})">
                                <div class="list-avatar friend">👤</div>
                                <div class="list-info">
                                    <div class="list-name">${friend.friendRemark || friend.userName || '好友'}</div>
                                    <div class="list-status online">在线</div>
                                </div>
                            </div>
                        `).join('');
                    } else {
                        container.innerHTML = '<div class="empty-state">暂无好友</div>';
                    }
                })
                .catch(error => {
                    console.error('加载好友列表失败:', error);
                    container.innerHTML = '<div class="empty-state">加载失败</div>';
                });
        }
        
        // 加载群聊列表
        function loadGroupsList() {
            const container = document.getElementById('groupsList');
            
            fetch(`/api/chat/group/list?userId=${currentUserId}`)
                .then(response => response.json())
                .then(data => {
                    if (data.code === 200 && data.data && data.data.length > 0) {
                        container.innerHTML = data.data.map(group => `
                            <div class="list-item" onclick="openGroupChat(${group.id})">
                                <div class="list-avatar group">👥</div>
                                <div class="list-info">
                                    <div class="list-name">${group.groupName}</div>
                                    <div class="list-status">${group.memberCount || 0}人</div>
                                </div>
                            </div>
                        `).join('');
                    } else {
                        container.innerHTML = '<div class="empty-state">暂无群聊</div>';
                    }
                })
                .catch(error => {
                    console.error('加载群聊列表失败:', error);
                    container.innerHTML = '<div class="empty-state">加载失败</div>';
                });
        }
        
        // 打开好友详情
        function openFriendDetail(friendId) {
            window.location.href = `friend-detail.html?friendId=${friendId}`;
        }
        
        // 打开群聊
        function openGroupChat(groupId) {
            window.location.href = `chat-detail.html?groupId=${groupId}`;
        }
        
        // 打开客服聊天
        function openServiceChat(serviceId) {
            window.location.href = `chat-detail.html?serviceId=${serviceId || 1}`;
        }
        
        // 打开 AI 助手
        function openAiAssistant() {
            window.location.href = `chat-detail.html?type=ai`;
        }
        
        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', function() {
            loadOfficialServices();
        });
    </script>
</body>
</html>
