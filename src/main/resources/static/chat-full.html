<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聊天系统 - 六个阶段完整版</title>
    <link rel="stylesheet" href="css/chat-complete.css">
</head>
<body>
    <div class="chat-container">
        <!-- 左侧边栏：会话列表 -->
        <div class="sidebar">
            <!-- 用户信息 -->
            <div class="user-info">
                <div class="user-avatar" id="currentUserAvatar">我</div>
                <div class="user-details">
                    <div class="user-name" id="currentUserName">用户</div>
                    <div class="user-status">在线</div>
                </div>
            </div>
            
            <!-- 搜索框 -->
            <div class="search-box">
                <input type="text" placeholder="搜索好友、群聊、消息..." id="searchInput" oninput="searchChats()">
                <button class="search-btn" onclick="searchChats()">🔍</button>
            </div>
            
            <!-- 功能标签页 -->
            <div class="tab-menu">
                <button class="tab-btn active" data-tab="all" onclick="switchTab('all')">全部</button>
                <button class="tab-btn" data-tab="friend" onclick="switchTab('friend')">好友</button>
                <button class="tab-btn" data-tab="group" onclick="switchTab('group')">群聊</button>
                <button class="tab-btn" data-tab="service" onclick="switchTab('service')">客服</button>
                <button class="tab-btn" data-tab="ai" onclick="switchTab('ai')">AI</button>
            </div>
            
            <!-- 会话列表 -->
            <div class="chat-list" id="chatList">
                <div class="loading-state">
                    <div class="loading-spinner"></div>
                    <div>加载中...</div>
                </div>
            </div>
            
            <!-- 底部功能按钮 -->
            <div class="sidebar-footer">
                <button class="action-btn" onclick="showCreateGroupModal()" title="创建群聊">
                    <span>👥</span>
                    <span class="btn-text">建群</span>
                </button>
                <button class="action-btn" onclick="showAddFriendModal()" title="添加好友">
                    <span>➕</span>
                    <span class="btn-text">加好友</span>
                </button>
                <button class="action-btn" onclick="showContactServiceModal()" title="联系客服">
                    <span>🎧</span>
                    <span class="btn-text">客服</span>
                </button>
                <button class="action-btn" onclick="toggleAIChat()" title="AI 助手">
                    <span>🤖</span>
                    <span class="btn-text">AI</span>
                </button>
            </div>
        </div>
        
        <!-- 主聊天区域 -->
        <div class="main-chat">
            <!-- 未选中会话时的提示 -->
            <div class="no-chat-selected" id="noChatSelected">
                <div class="welcome-state">
                    <div class="welcome-icon">💬</div>
                    <h2>欢迎使用聊天系统</h2>
                    <p>选择一个聊天开始对话，或创建新的聊天</p>
                    <div class="welcome-features">
                        <div class="feature-item">
                            <div class="feature-icon">👥</div>
                            <div>好友聊天</div>
                        </div>
                        <div class="feature-item">
                            <div class="feature-icon">🏠</div>
                            <div>群聊管理</div>
                        </div>
                        <div class="feature-item">
                            <div class="feature-icon">🎧</div>
                            <div>客服系统</div>
                        </div>
                        <div class="feature-item">
                            <div class="feature-icon">🤖</div>
                            <div>AI 助手</div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- 聊天窗口（选中会话后显示） -->
            <div class="chat-window" id="chatWindow" style="display: none;">
                <!-- 聊天头部 -->
                <div class="chat-header">
                    <div class="chat-info">
                        <div class="chat-avatar" id="chatAvatar"></div>
                        <div class="chat-details">
                            <div class="chat-name" id="chatName"></div>
                            <div class="chat-status" id="chatStatus"></div>
                        </div>
                    </div>
                    <div class="chat-actions">
                        <button class="header-btn" onclick="showSearchMessagePanel()" title="搜索消息">🔍</button>
                        <button class="header-btn" onclick="showChatSettings()" title="聊天设置">⚙️</button>
                        <button class="header-btn" onclick="toggleChatInfo()" title="聊天详情">ℹ️</button>
                    </div>
                </div>
                
                <!-- 消息列表 -->
                <div class="message-list" id="messageList">
                    <div class="loading-state">
                        <div class="loading-spinner"></div>
                        <div>加载消息中...</div>
                    </div>
                </div>
                
                <!-- 消息输入区域 -->
                <div class="message-input-area">
                    <!-- 工具栏 -->
                    <div class="input-toolbar">
                        <button class="tool-btn" onclick="selectImage()" title="发送图片">🖼️</button>
                        <button class="tool-btn" onclick="selectFile()" title="发送文件">📎</button>
                        <button class="tool-btn" onclick="showEmojiPanel()" title="表情">😊</button>
                        <button class="tool-btn" onclick="showMoreOptions()" title="更多">⋯</button>
                    </div>
                    
                    <!-- 输入框 -->
                    <div class="input-wrapper">
                        <textarea 
                            id="messageInput" 
                            placeholder="输入消息... (Ctrl+Enter 发送)" 
                            rows="3"
                            onkeydown="handleKeyDown(event)"
                            oninput="updateCharCount()"
                        ></textarea>
                    </div>
                    
                    <!-- 发送按钮和计数 -->
                    <div class="send-wrapper">
                        <div class="input-tools">
                            <label class="tool-label">
                                <input type="checkbox" id="enterToSend" checked> Enter 发送
                            </label>
                        </div>
                        <div class="send-tools">
                            <span class="char-count" id="charCount">0/500</span>
                            <button class="send-btn" onclick="sendMessage()">
                                <span>发送</span>
                                <span class="send-icon">➤</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 右侧信息面板 -->
        <div class="info-panel" id="infoPanel" style="display: none;">
            <div class="info-header">
                <h3>聊天详情</h3>
                <button class="close-btn" onclick="toggleChatInfo()">✕</button>
            </div>
            <div class="info-content" id="infoContent">
                <!-- 动态加载聊天详情 -->
            </div>
        </div>
    </div>
    
    <!-- 表情面板 -->
    <div class="emoji-panel" id="emojiPanel" style="display: none;">
        <!-- 表情列表由 JS 动态生成 -->
    </div>
    
    <!-- 更多选项面板 -->
    <div class="more-panel" id="morePanel" style="display: none;">
        <div class="more-item" onclick="sendLocation()">📍 位置</div>
        <div class="more-item" onclick="sendContact()">👤 名片</div>
        <div class="more-item" onclick="sendRedPacket()">🧧 红包</div>
        <div class="more-item" onclick="sendTransfer()">💰 转账</div>
        <div class="more-item" onclick="recordVoice()">🎤 语音</div>
        <div class="more-item" onclick="screenShare()">🖥️ 共享屏幕</div>
    </div>
    
    <!-- 创建群聊弹窗 -->
    <div class="modal" id="createGroupModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>创建群聊</h3>
                <button class="close-btn" onclick="closeModal('createGroupModal')">✕</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>群聊名称</label>
                    <input type="text" id="groupNameInput" placeholder="请输入群聊名称" class="modal-input">
                </div>
                <div class="form-group">
                    <label>选择成员</label>
                    <div class="friend-selector" id="friendListForGroup">
                        <!-- 好友列表由 JS 动态加载 -->
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="cancel-btn" onclick="closeModal('createGroupModal')">取消</button>
                <button class="confirm-btn" onclick="createGroupChat()">
                    <span>创建</span>
                    <span class="btn-icon">✓</span>
                </button>
            </div>
        </div>
    </div>
    
    <!-- 添加好友弹窗 -->
    <div class="modal" id="addFriendModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>添加好友</h3>
                <button class="close-btn" onclick="closeModal('addFriendModal')">✕</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>好友 ID</label>
                    <input type="text" id="friendIdInput" placeholder="请输入好友 ID" class="modal-input">
                </div>
                <div class="form-group">
                    <label>验证消息</label>
                    <textarea id="addFriendMessage" placeholder="我是...，想加你为好友" class="modal-textarea"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="cancel-btn" onclick="closeModal('addFriendModal')">取消</button>
                <button class="confirm-btn" onclick="sendFriendRequest()">
                    <span>发送申请</span>
                    <span class="btn-icon">➤</span>
                </button>
            </div>
        </div>
    </div>
    
    <!-- 联系客服弹窗 -->
    <div class="modal" id="contactServiceModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>联系客服</h3>
                <button class="close-btn" onclick="closeModal('contactServiceModal')">✕</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>服务类型</label>
                    <select id="serviceType" class="modal-select">
                        <option value="general">通用咨询</option>
                        <option value="order">订单问题</option>
                        <option value="refund">退款售后</option>
                        <option value="product">商品咨询</option>
                        <option value="technical">技术问题</option>
                        <option value="other">其他</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>问题描述</label>
                    <textarea id="serviceMessage" placeholder="请详细描述您遇到的问题" class="modal-textarea" rows="4"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="cancel-btn" onclick="closeModal('contactServiceModal')">取消</button>
                <button class="confirm-btn" onclick="contactService()">
                    <span>开始咨询</span>
                    <span class="btn-icon">➤</span>
                </button>
            </div>
        </div>
    </div>
    
    <!-- 群管理弹窗 -->
    <div class="modal" id="groupManageModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>群管理</h3>
                <button class="close-btn" onclick="closeModal('groupManageModal')">✕</button>
            </div>
            <div class="modal-body">
                <div class="manage-tabs">
                    <button class="manage-tab-btn active" onclick="switchManageTab('members')">群成员</button>
                    <button class="manage-tab-btn" onclick="switchManageTab('announcement')">群公告</button>
                    <button class="manage-tab-btn" onclick="switchManageTab('settings')">群设置</button>
                </div>
                <div class="manage-content" id="manageContent">
                    <!-- 动态加载管理内容 -->
                </div>
            </div>
        </div>
    </div>
    
    <script src="js/chat-complete.js"></script>
</body>
</html>
