<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0">
    <title>我的订单 - 手工绿豆糕商城</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "PingFang SC", "Helvetica Neue", sans-serif;
            background: #FDFBF5;
            max-width: 414px;
            margin: 0 auto;
            color: #5A4B40;
        }

        /* 顶部导航栏 */
        .order-header {
            background: #fff;
            padding: 12px 15px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #F0EBE4;
            position: sticky;
            top: 0;
            z-index: 90;
        }
        .back-btn {
            font-size: 18px;
            color: #5A4B40;
            margin-right: 10px;
            cursor: pointer;
        }
        .header-title {
            flex: 1;
            text-align: center;
            font-size: 16px;
            font-weight: 500;
        }

        /* 搜索栏 */
        .search-bar {
            background: #fff;
            padding: 8px 15px;
            border-bottom: 1px solid #F0EBE4;
        }
        .search-input {
            width: 100%;
            height: 32px;
            background: #F8F5EE;
            border: 1px solid #D9D2C8;
            border-radius: 16px;
            padding: 0 15px;
            font-size: 13px;
            color: #5A4B40;
            outline: none;
        }
        .search-input::placeholder {
            color: #948678;
        }

        /* 订单标签栏 */
        .order-tabs {
            background: #fff;
            display: flex;
            overflow-x: auto;
            padding: 10px 0;
            border-bottom: 1px solid #F0EBE4;
        }
        .order-tabs::-webkit-scrollbar {
            display: none;
        }
        .tab-item {
            flex: none;
            padding: 0 12px;
            font-size: 14px;
            color: #948678;
            line-height: 24px;
            position: relative;
            cursor: pointer;
        }
        .tab-item.active {
            color: #A1C895;
            font-weight: 500;
        }
        .tab-item.active::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 2px;
            background: #A1C895;
            border-radius: 1px;
        }

        /* 优惠券提示栏 */
        .coupon-tip {
            background: #FFF8F0;
            padding: 8px 15px;
            font-size: 12px;
            color: #FF8800;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .coupon-icon {
            color: #FF8800;
            font-size: 14px;
        }

        /* 空订单区域 */
        .empty-order {
            background: #fff;
            padding: 60px 20px;
            text-align: center;
            margin: 8px 10px;
            border-radius: 8px;
            display: none;
        }
        .empty-icon {
            font-size: 40px;
            color: #D9D2C8;
            margin-bottom: 15px;
        }
        .empty-text {
            font-size: 14px;
            color: #948678;
            margin-bottom: 10px;
        }
        .empty-link {
            font-size: 13px;
            color: #A1C895;
        }
        .empty-link a {
            color: #A1C895;
            text-decoration: none;
        }

        /* 订单列表 */
        .order-list {
            margin: 8px 10px;
            background: #fff;
            border-radius: 8px;
            overflow: hidden;
        }

        /* 订单项 */
        .order-item {
            border-bottom: 1px solid #F0EBE4;
            padding: 12px 15px;
        }
        .order-item:last-child {
            border-bottom: none;
        }

        /* 订单店铺栏 */
        .order-shop {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .shop-name {
            font-size: 13px;
            color: #5A4B40;
        }
        .shop-tag {
            font-size: 10px;
            color: #fff;
            background: #A1C895;
            padding: 1px 4px;
            border-radius: 2px;
            margin-left: 5px;
        }
        .order-status {
            font-size: 12px;
            color: #FF8800;
        }

        /* 订单商品栏 */
        .order-goods {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        .goods-img {
            width: 60px;
            height: 60px;
            border-radius: 6px;
            background: #F8F5EE;
            overflow: hidden;
        }
        .goods-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .goods-info {
            flex: 1;
        }
        .goods-name {
            font-size: 13px;
            line-height: 1.4;
            margin-bottom: 5px;
            color: #5A4B40;
        }
        .goods-spec {
            font-size: 11px;
            color: #948678;
            margin-bottom: 5px;
        }
        .goods-tip {
            font-size: 10px;
            color: #fff;
            background: #A1C895;
            padding: 1px 4px;
            border-radius: 2px;
            display: inline-block;
        }
        .goods-price {
            font-size: 14px;
            color: #5A4B40;
            font-weight: bold;
            text-align: right;
        }
        .goods-count {
            font-size: 12px;
            color: #948678;
        }

        /* 订单金额栏 */
        .order-price {
            text-align: right;
            font-size: 13px;
            margin-bottom: 10px;
        }
        .price-text {
            color: #948678;
        }
        .price-num {
            color: #5A4B40;
            font-weight: bold;
        }

        /* 物流信息栏 */
        .order-logistics {
            font-size: 12px;
            color: #948678;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* 订单操作栏 */
        .order-opt {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }
        .opt-btn {
            padding: 5px 12px;
            font-size: 12px;
            border-radius: 4px;
            border: 1px solid #D9D2C8;
            background: #fff;
            color: #948678;
            cursor: pointer;
        }
        .opt-btn.primary {
            background: #A1C895;
            color: #fff;
            border-color: #A1C895;
        }

        /* 评价模块头部 */
        .eval-header {
            background: #fff;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 8px 10px;
            border-radius: 8px 8px 0 0;
            display: none;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #F8F5EE;
            overflow: hidden;
        }
        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .user-stats {
            display: flex;
            gap: 15px;
            font-size: 12px;
            color: #948678;
        }
        .stat-num {
            font-size: 14px;
            color: #5A4B40;
            font-weight: 500;
            display: block;
        }

        /* 评价消息提醒 */
        .eval-tip {
            background: #fff;
            padding: 12px 15px;
            font-size: 14px;
            color: #5A4B40;
            border-top: 1px solid #F0EBE4;
            margin: 0 10px;
            display: none;
        }
    </style>
</head>

<script>
    let currentTab = 'all';
    let ordersData = [];

    // 页面加载完成后执行
    document.addEventListener('DOMContentLoaded', function() {
        // 获取URL参数，确定进入的页面状态
        const urlParams = new URLSearchParams(window.location.search);
        const tab = urlParams.get('tab') || 'all';
        
        // 初始化页面
        initPage(tab);
        
        // 加载订单数据
        loadOrders();
    });

    // 初始化页面
    function initPage(tab) {
        currentTab = tab;
        
        // 设置顶部标题
        const headerTitle = document.getElementById('headerTitle');
        const tabTitles = {
            'all': '我的订单',
            'pending_payment': '待付款',
            'pending_share': '待分享',
            'pending_ship': '待发货',
            'pending_receive': '待收货',
            'refunding': '退款中',
            'evaluation': '评价'
        };
        headerTitle.textContent = tabTitles[tab] || '我的订单';
        
        // 激活对应的标签
        const tabItems = document.querySelectorAll('.tab-item');
        tabItems.forEach(item => {
            item.classList.remove('active');
            if (item.dataset.tab === tab) {
                item.classList.add('active');
            }
        });
        
        // 根据标签显示对应内容
        updateContentDisplay(tab);
    }

    // 更新内容显示
    function updateContentDisplay(tab) {
        const emptyOrder = document.getElementById('emptyOrder');
        const orderList = document.getElementById('orderList');
        const evalHeader = document.getElementById('evalHeader');
        const evalTip = document.getElementById('evalTip');
        
        // 重置显示状态
        emptyOrder.style.display = 'none';
        orderList.style.display = 'block';
        evalHeader.style.display = 'none';
        evalTip.style.display = 'none';
        
        // 根据标签显示不同内容
        switch(tab) {
            case 'pending_share':
                // 待分享显示空状态（项目中没有这个状态）
                emptyOrder.style.display = 'block';
                orderList.style.display = 'none';
                document.getElementById('emptyText').textContent = '您还没有相关的订单';
                break;
            case 'evaluation':
                // 评价页面显示评价模块
                evalHeader.style.display = 'block';
                evalTip.style.display = 'block';
                break;
            default:
                // 其他状态（全部、待付款、待发货、待收货）都显示订单列表
                orderList.style.display = 'block';
                break;
        }
    }

    // 加载订单数据
    async function loadOrders() {
        // 从 localStorage 获取订单数据（用于临时订单）
        let localOrders = JSON.parse(localStorage.getItem('pdd_orders') || '[]');
        
        // 检查是否有待付款的订单（从支付页面返回）
        const pendingPaymentOrder = JSON.parse(localStorage.getItem('pdd_pending_payment') || 'null');
        if (pendingPaymentOrder) {
            // 将待付款订单添加到订单列表
            localOrders.unshift(pendingPaymentOrder);
            localStorage.setItem('pdd_orders', JSON.stringify(localOrders));
            localStorage.removeItem('pdd_pending_payment');
        }
        
        // 从后端API获取真实订单数据
        try {
            const userInfo = JSON.parse(localStorage.getItem('userInfo') || '{}');
            const token = localStorage.getItem('token');
            
            // 检查用户是否已登录
            if (token && userInfo && userInfo.userId) {
                try {
                    // 确保用户 ID 是数字类型，如果不是数字则使用默认用户 ID 1
                    let userId = parseInt(userInfo.userId);
                    if (isNaN(userId)) {
                        console.warn('用户 ID 不是数字格式，使用默认用户 ID 1');
                        console.log('原始用户 ID:', userInfo.userId);
                        userId = 1; // 使用默认用户 ID
                    }
                    console.log('从后端获取订单数据，用户 ID:', userId);
                    
                    // 查询所有状态的订单（不限制状态）
                    const response = await fetch(`/api/order/list/${userId}`, {
                        method: 'GET',
                        headers: {
                            'Authorization': token ? `Bearer ${token}` : '',
                            'Content-Type': 'application/json'
                        },
                        credentials: 'same-origin'
                    });
                    
                    console.log('订单列表响应状态:', response.status);
                    
                    if (response.ok) {
                        const result = await response.json();
                        console.log('后端返回的订单数据:', result);
                        if (result.code === 200 && result.data) {
                            // 将后端订单数据转换为前端格式
                            const backendOrders = result.data.map(order => ({
                                id: order.id,
                                orderNo: order.orderNo,
                                shopName: '臻欣绿豆糕官方店',
                                shopTag: '臻欣自营',
                                status: getFrontendStatus(order.status),
                                statusText: getStatusText(order.status),
                                productName: '绿豆糕 经典原味 传统糕点',
                                spec: '规格：经典原味·250g',
                                price: order.totalAmount,
                                quantity: 1,
                                total: order.totalAmount,
                                image: '/images/product/product1.jpg',
                                createTime: order.createTime,
                                logistics: ''
                            }));
                            
                            console.log('转换后的后端订单:', backendOrders);
                            
                            // 合并本地订单和后端订单，去重
                            ordersData = [...backendOrders, ...localOrders.filter(localOrder => 
                                !backendOrders.some(backendOrder => backendOrder.id === localOrder.id)
                            )];
                            
                            console.log('合并后的订单数据:', ordersData);
                        } else {
                            console.warn('后端返回数据异常:', result);
                            ordersData = localOrders;
                        }
                    } else {
                        console.error('后端 API 调用失败，状态码:', response.status);
                        ordersData = localOrders;
                    }
                } catch (fetchError) {
                    console.error('获取后端订单异常:', fetchError);
                    // 如果后端获取失败，使用本地数据
                    ordersData = localOrders;
                }
            } else {
                console.log('用户未登录或用户信息缺失，使用本地数据');
                console.log('token:', token ? '存在' : '缺失');
                console.log('userInfo:', userInfo);
                ordersData = localOrders;
            }
        } catch (error) {
            console.error('获取后端订单失败:', error);
            // 如果后端获取失败，使用本地数据
            ordersData = localOrders;
        }
        
        // 过滤掉非绿豆糕商品的硬编码订单（只保留我们项目的商品）
        ordersData = ordersData.filter(order => {
            return order.productName && (
                order.productName.includes('绿豆糕') || 
                order.productName.includes('绿豆饼') ||
                order.productName.includes('桃山月饼')
            );
        });
        
        // 过滤掉已取消的订单（状态为 cancelled 或 已取消）
        ordersData = ordersData.filter(order => {
            return order.status !== 'cancelled' && order.statusText !== '已取消';
        });
        
        // 如果没有订单数据，显示空状态
        if (ordersData.length === 0) {
            const emptyOrder = document.getElementById('emptyOrder');
            const orderList = document.getElementById('orderList');
            emptyOrder.style.display = 'block';
            orderList.style.display = 'none';
            document.getElementById('emptyText').textContent = '您还没有相关的订单';
            return;
        }
        
        renderOrders();
    }
    
    // 将后端状态转换为前端状态
     function getFrontendStatus(status) {
         const statusMap = {
             0: 'pending_payment', // 待付款
             1: 'pending_ship',    // 待发货
             2: 'pending_receive', // 待收货
             3: 'evaluation',      // 待评价
             4: 'completed',       // 已完成
             5: 'cancelled',       // 已取消
             99: 'refunding',      // 退款中
             100: 'refunded'       // 已退款
         };
         return statusMap[status] || 'pending_payment';
     }
     
     // 获取状态文本
     function getStatusText(status) {
         const statusTextMap = {
             0: '待付款',
             1: '待发货',
             2: '待收货',
             3: '待评价',
             4: '已完成',
             5: '已取消',
             99: '退款中',
             100: '已退款'
         };
         return statusTextMap[status] || '待付款';
     }

    // 创建新订单（从支付页面调用）
    function createNewOrder(orderInfo) {
        const newOrder = {
            id: Date.now(),
            shopName: '臻欣绿豆糕官方店',
            shopTag: '臻欣自营',
            status: 'pending_payment',
            statusText: '待付款',
            productName: orderInfo.productName,
            spec: `规格：${orderInfo.taste}·${orderInfo.spec}`,
            price: orderInfo.price,
            quantity: orderInfo.quantity,
            total: (orderInfo.price * orderInfo.quantity).toFixed(2),
            logistics: '',
            image: orderInfo.image,
            createTime: new Date().toISOString(),
            expireTime: new Date(Date.now() + 30 * 60 * 1000).toISOString() // 30分钟过期
        };
        
        // 添加到订单列表
        ordersData.unshift(newOrder);
        localStorage.setItem('pdd_orders', JSON.stringify(ordersData));
        
        return newOrder;
    }

    // 渲染订单
    function renderOrders() {
        const orderList = document.getElementById('orderList');
        
        // 根据当前标签过滤订单
        const filteredOrders = ordersData.filter(order => {
            // 过滤掉已退款的订单
            if (order.status === 100) return false;
            
            if (currentTab === 'all') return true;
            return order.status === currentTab;
        });
        
        if (filteredOrders.length === 0) {
            orderList.innerHTML = '';
            return;
        }
        
        // 渲染订单列表
        orderList.innerHTML = '';
        filteredOrders.forEach(order => {
            const orderItem = document.createElement('div');
            orderItem.className = 'order-item';
            orderItem.dataset.orderId = order.id;
            orderItem.dataset.orderNo = order.orderNo || 'ORD' + order.id;
            orderItem.innerHTML = `
                <div class="order-shop">
                    <div class="shop-name">${order.shopName}${order.shopTag ? `<span class="shop-tag">${order.shopTag}</span>` : ''}</div>
                    <div class="order-status">${order.statusText}</div>
                </div>
                <div class="order-goods">
                    <div class="goods-img">
                        <img src="${order.image}" alt="${order.productName}">
                    </div>
                    <div class="goods-info">
                        <div class="goods-name">${order.productName}</div>
                        <div class="goods-spec">${order.spec}</div>
                        <div class="goods-tip">7天无理由退货</div>
                        <div class="goods-price">¥${order.price} <span class="goods-count">×${order.quantity}</span></div>
                    </div>
                </div>
                <div class="order-price">
                    <span class="price-text">实付：</span>
                    <span class="price-num">¥${order.total}</span>
                    <span class="price-text"> (免运费)</span>
                </div>
                ${order.logistics ? `<div class="order-logistics"><div>📦</div><div>${order.logistics}</div></div>` : ''}
                <div class="order-opt">
                    <button class="opt-btn">更多</button>
                    ${order.status === 'pending_payment' ? '<button class="opt-btn">取消订单</button><button class="opt-btn primary">立即支付</button>' : ''}
                    ${order.status === 'pending_ship' ? '<button class="opt-btn refund-btn" data-order-id="' + order.id + '">申请退款</button><button class="opt-btn">联系客服</button>' : ''}
                    ${order.status === 'pending_receive' ? '<button class="opt-btn refund-btn" data-order-id="' + order.id + '">申请退款</button><button class="opt-btn">查看物流</button><button class="opt-btn primary">确认收货</button>' : ''}
                    ${order.status === 'evaluation' ? '<button class="opt-btn">再次拼单</button><button class="opt-btn primary">立即评价</button>' : ''}
                    ${order.status === 'completed' ? '<button class="opt-btn">申请售后</button><button class="opt-btn">再次购买</button>' : ''}
                </div>
            `;
            orderList.appendChild(orderItem);
        });
        
        // 绑定操作按钮事件
        bindOrderEvents();
    }

    // 绑定订单操作事件（使用事件委托）
    function bindOrderEvents() {
        const orderList = document.getElementById('orderList');
        orderList.addEventListener('click', function(e) {
            const btn = e.target.closest('.opt-btn');
            if (!btn) return;
            
            const action = btn.textContent.trim();
            const orderItem = btn.closest('.order-item');
            const orderId = parseInt(orderItem.dataset.orderId);
            const orderStatus = orderItem.querySelector('.order-status').textContent.trim();
            
            console.log('点击了按钮:', action, '订单 ID:', orderId, '订单状态:', orderStatus);
            
            // 特殊处理"申请退款"按钮，直接跳转不经过 switch
            if (action === '申请退款') {
                if (orderStatus === '待付款') {
                    alert('待付款订单不能申请退款，请先取消订单');
                } else {
                    console.log('跳转到退款页面，订单 ID:', orderId);
                    // 直接修改 location，不使用 window.open
                    window.location.href = '/refund.html?orderId=' + orderId;
                }
                return; // 直接返回，不执行下面的 switch
            }
            
            switch(action) {
                case '立即支付':
                    // 跳转到支付页面
                    window.location.href = '/checkout.html?orderId=' + orderId;
                    break;
                case '取消订单':
                    // 显示取消订单组件
                    cancelOrder(orderId);
                    break;
                case '确认收货':
                    // 更新订单状态为待评价
                    updateOrderStatus(orderId, 'evaluation', '待评价');
                    alert('确认收货成功！订单已移至待评价');
                    break;
                case '立即评价':
                    alert('跳转到评价页面');
                    break;
                case '查看物流':
                    // 跳转到物流详情页面
                    const orderNo = orderItem.dataset.orderNo;
                    console.log('=== 查看物流 ===');
                    console.log('orderId:', orderId);
                    console.log('orderNo:', orderNo);
                    console.log('orderItem dataset:', orderItem.dataset);
                    
                    if (!orderNo) {
                        console.error('orderNo 为空！');
                        alert('订单号获取失败，请刷新页面重试');
                        break;
                    }
                    
                    // 显示加载提示
                    const targetUrl = '/logistics-detail.html?orderId=' + orderId + '&orderNo=' + orderNo;
                    console.log('跳转 URL:', targetUrl);
                    
                    // 使用 setTimeout 确保日志输出完成后再跳转
                    setTimeout(function() {
                        window.location.href = targetUrl;
                    }, 100);
                    break;
                case '联系客服':
                    alert('联系客服处理');
                    break;
                case '申请售后':
                    alert('申请售后服务');
                    break;
                case '再次购买':
                    alert('再次购买商品');
                    break;
                case '再次拼单':
                    alert('再次拼单');
                    break;
                default:
                    alert(`执行操作：${action}`);
                    break;
            }
        });
    }

    // 更新订单状态
    function updateOrderStatus(orderId, newStatus, newStatusText) {
        // 查找并更新订单
        const orderIndex = ordersData.findIndex(order => order.id === orderId);
        if (orderIndex !== -1) {
            ordersData[orderIndex].status = newStatus;
            ordersData[orderIndex].statusText = newStatusText;
            
            // 保存更新后的订单
            localStorage.setItem('pdd_orders', JSON.stringify(ordersData));
            
            // 重新渲染订单列表
            renderOrders();
            
            // 更新个人中心角标
            if (window.opener) {
                window.opener.updateMineOrderStatus();
            }
        }
    }
    
    // 取消订单
     async function cancelOrder(orderId) {
         if (!confirm('确定要取消这个订单吗？')) {
             return;
         }
         
         console.log('开始取消订单，订单ID:', orderId);
         
         try {
             // 调用后端API取消订单
             const url = `/api/order/cancel/${orderId}`;
             console.log('调用API:', url);
             
             const response = await fetch(url, {
                 method: 'POST',
                 headers: {
                     'Content-Type': 'application/json'
                 }
             });
             
             console.log('API响应状态:', response.status);
             
             const result = await response.json();
             console.log('API返回结果:', result);
             
             if (result.code === 200) {
                 // 后端取消成功，直接从订单列表中移除该订单
                 removeOrderFromList(orderId);
                 alert('订单取消成功！');
                 
                 // 重新加载订单数据，确保显示最新状态
                 await loadOrders();
             } else {
                 alert('取消订单失败：' + (result.message || '未知错误'));
             }
         } catch (error) {
             console.error('取消订单失败:', error);
             alert('网络错误，请稍后重试');
         }
     }
     
     // 从订单列表中移除订单
     function removeOrderFromList(orderId) {
         // 从本地订单数据中移除
         const index = ordersData.findIndex(order => order.id === orderId);
         if (index !== -1) {
             ordersData.splice(index, 1);
             localStorage.setItem('pdd_orders', JSON.stringify(ordersData));
         }
         
         // 从页面中移除订单卡片
         const orderItem = document.querySelector(`.order-item[data-order-id="${orderId}"]`);
         if (orderItem) {
             orderItem.remove();
         }
         
         // 如果订单列表为空，显示空状态
         const orderList = document.getElementById('orderList');
         const emptyOrder = document.getElementById('emptyOrder');
         if (orderList.children.length === 0) {
             emptyOrder.style.display = 'block';
             orderList.style.display = 'none';
             document.getElementById('emptyText').textContent = '您还没有相关的订单';
         }
     }
     
     // 显示取消订单模态框
    function showCancelModal(orderId) {
        currentCancelOrderId = orderId;
        selectedReason = '';
        
        // 重置选择状态
        document.querySelectorAll('.reason-item').forEach(item => {
            item.classList.remove('selected');
        });
        
        // 禁用确认按钮
        document.getElementById('confirmCancelBtn').disabled = true;
        
        // 显示模态框
        document.getElementById('cancelOrderModal').style.display = 'block';
    }
    
    // 关闭取消订单模态框
    function closeCancelModal() {
        document.getElementById('cancelOrderModal').style.display = 'none';
        currentCancelOrderId = null;
        selectedReason = '';

    }
    
    // 选择取消原因
    function selectReason(element, reason) {
        // 移除所有选择状态
        document.querySelectorAll('.reason-item').forEach(item => {
            item.classList.remove('selected');
        });
        
        // 设置当前选择
        element.classList.add('selected');
        selectedReason = reason;
        
        // 启用确认按钮
        document.getElementById('confirmCancelBtn').disabled = false;
    }
    
    // 确认取消订单
    async function confirmCancelOrder() {
        if (!currentCancelOrderId || !selectedReason) {
            alert('请选择取消原因');
            return;
        }
        
        // 使用选择的理由
        let finalReason = selectedReason;
        
        try {
            // 调用后端 API 取消订单
            const response = await fetch(`/api/order/cancel/${currentCancelOrderId}`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                }
            });
            
            const result = await response.json();
            console.log('取消订单结果:', result);
            
            if (result.code === 200) {
                // 后端取消成功，从本地订单数据中移除
                let ordersData = JSON.parse(localStorage.getItem('pdd_orders') || '[]');
                const updatedOrders = ordersData.filter(order => order.id != currentCancelOrderId);
                localStorage.setItem('pdd_orders', JSON.stringify(updatedOrders));
                
                // 记录取消原因（可选：保存到 localStorage）
                const cancelRecord = {
                    orderId: currentCancelOrderId,
                    reason: finalReason,
                    cancelTime: new Date().toISOString()
                };
                
                let cancelRecords = JSON.parse(localStorage.getItem('pdd_cancel_records') || '[]');
                cancelRecords.push(cancelRecord);
                localStorage.setItem('pdd_cancel_records', JSON.stringify(cancelRecords));
                
                // 关闭模态框
                closeCancelModal();
                
                // 重新加载订单列表
                loadOrders();
                
                // 显示成功提示
                alert(`订单已取消\n取消原因：${finalReason}`);
            } else {
                alert('取消订单失败：' + (result.message || '未知错误'));
            }
        } catch (error) {
            console.error('取消订单失败:', error);
            alert('网络错误，请稍后重试');
        }
    }

    // 标签切换
    function switchToTab(tab) {
        initPage(tab);
        renderOrders();
    }

    // 绑定标签点击事件
    document.querySelectorAll('.tab-item').forEach(tab => {
        tab.addEventListener('click', function() {
            switchToTab(this.dataset.tab);
        });
    });

    // 返回上一页 - 智能判断返回路径
    function goBack() {
        // 检查是否从个人中心页面跳转过来
        if (document.referrer.includes('index.html') || document.referrer.includes('minePage')) {
            // 直接跳转到个人中心
            window.location.href = '/index.html#minePage';
        } else if (document.referrer.includes('product-detail.html')) {
            // 从商品详情页返回，直接返回首页
            window.location.href = '/index.html#homePage';
        } else {
            // 其他情况使用浏览器返回
            window.history.back();
        }
    }

    // 搜索功能
    document.querySelector('.search-input').addEventListener('input', function(e) {
        const keyword = e.target.value.trim().toLowerCase();
        if (keyword) {
            // 实现搜索逻辑
            console.log('搜索关键词：', keyword);
        }
    });
    
    // ==================== 物流追踪相关函数 ====================
    
    /**
     * 查看物流信息
     * @param {number} orderId - 订单 ID
     * @param {string} orderNo - 订单号
     */
    function viewLogisticsDetail(orderId, orderNo) {
        console.log('查看物流:', orderId, orderNo);
        
        // 显示物流详情页面
        const logisticsPage = document.getElementById('logisticsDetailPage');

            // 加载物流信息
            loadLogisticsDetail(orderId, orderNo);
        } else {
            alert('物流页面不存在');
        }
    }
    
    /**

     */

                    status: '已到达【上海浦东分拣中心】',

                    status: '已从【杭州萧山分拣中心】发出',
                    location: '杭州'
                },
                {
                    time: new Date(Date.now() - 12 * 3600 * 1000).toLocaleString('zh-CN'),
                    status: '已揽收',

                }
            ]
        };

        document.getElementById('logisticsOrderNo').textContent = '订单号：' + logisticsInfo.orderNo;
        document.getElementById('logisticsNo').textContent = '物流单号：' + logisticsInfo.logisticsNo;
        document.getElementById('logisticsCompany').textContent = '物流公司：' + logisticsInfo.companyName;

        const trackList = document.getElementById('logisticsTrackList');
        trackList.innerHTML = '';
        
        logisticsInfo.tracks.forEach((track, index) => {
            const trackItem = document.createElement('div');
            trackItem.className = 'logistics-track-item';
            trackItem.innerHTML = `
                <div class="track-time">${track.time}</div>
                <div class="track-status">${track.status}</div>
                <div class="track-location">${track.location}</div>
            `;
            trackList.appendChild(trackItem);
        });
    }
    
    /**
     * 返回订单列表
     */
    function backToOrderList() {
        const logisticsPage = document.getElementById('logisticsDetailPage');
        if (logisticsPage) {
            logisticsPage.classList.remove('active');
            logisticsPage.style.display = 'none';
        }
    }
</script>
