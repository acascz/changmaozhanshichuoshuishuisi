# Redis 配置文件 - 绿豆糕商城项目
# 此配置文件可以随项目一起分发

# 绑定地址 - 允许本地连接
bind 127.0.0.1

# 端口
port 6379

# 守护进程模式（Windows 下需要设置为 no）
daemonize no

# 日志文件位置（相对路径）
logfile ""

# 数据库数量
databases 16

# 数据持久化文件位置（相对路径）
dir ./

# RDB 持久化配置
save 900 1
save 300 10
save 60 10000

# 启用 AOF 持久化
appendonly yes
appendfilename "appendonly.aof"

# 内存限制（可选，根据需要调整）
# maxmemory 256mb
# maxmemory-policy allkeys-lru

# 保护模式
protected-mode yes

# TCP 连接 backlog
tcp-backlog 511

# 客户端超时（0 表示不超时）
timeout 0

# TCP keepalive
tcp-keepalive 300
