<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0">
    <title>我的订单 - 手工绿豆糕商城</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "PingFang SC", "Helvetica Neue", sans-serif;
            background: #FDFBF5;
            max-width: 414px;
            margin: 0 auto;
            color: #5A4B40;
        }

        /* 顶部导航栏 */
        .order-header {
            background: #fff;
            padding: 12px 15px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #F0EBE4;
            position: sticky;
            top: 0;
            z-index: 90;
        }
        .back-btn {
            font-size: 18px;
            color: #5A4B40;
            margin-right: 10px;
            cursor: pointer;
        }
        .header-title {
            flex: 1;
            text-align: center;
            font-size: 16px;
            font-weight: 500;
        }

        /* 搜索栏 */
        .search-bar {
            background: #fff;
            padding: 8px 15px;
            border-bottom: 1px solid #F0EBE4;
        }
        .search-input {
            width: 100%;
            height: 32px;
            background: #F8F5EE;
            border: 1px solid #D9D2C8;
            border-radius: 16px;
            padding: 0 15px;
            font-size: 13px;
            color: #5A4B40;
            outline: none;
        }
        .search-input::placeholder {
            color: #948678;
        }

        /* 订单标签栏 */
        .order-tabs {
            background: #fff;
            display: flex;
            overflow-x: auto;
            padding: 10px 0;
            border-bottom: 1px solid #F0EBE4;
        }
        .order-tabs::-webkit-scrollbar {
            display: none;
        }
        .tab-item {
            flex: none;
            padding: 0 12px;
            font-size: 14px;
            color: #948678;
            line-height: 24px;
            position: relative;
            cursor: pointer;
        }
        .tab-item.active {
            color: #A1C895;
            font-weight: 500;
        }
        .tab-item.active::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 2px;
            background: #A1C895;
            border-radius: 1px;
        }

        /* 优惠券提示栏 */
        .coupon-tip {
            background: #FFF8F0;
            padding: 8px 15px;
            font-size: 12px;
            color: #FF8800;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .coupon-icon {
            color: #FF8800;
            font-size: 14px;
        }

        /* 空订单区域 */
        .empty-order {
            background: #fff;
            padding: 60px 20px;
            text-align: center;
            margin: 8px 10px;
            border-radius: 8px;
            display: none;
        }
        .empty-icon {
            font-size: 40px;
            color: #D9D2C8;
            margin-bottom: 15px;
        }
        .empty-text {
            font-size: 14px;
            color: #948678;
            margin-bottom: 10px;
        }
        .empty-link {
            font-size: 13px;
            color: #A1C895;
        }
        .empty-link a {
            color: #A1C895;
            text-decoration: none;
        }

        /* 订单列表 */
        .order-list {
            margin: 8px 10px;
            background: #fff;
            border-radius: 8px;
            overflow: hidden;
        }

        /* 订单项 */
        .order-item {
            border-bottom: 1px solid #F0EBE4;
            padding: 12px 15px;
        }
        .order-item:last-child {
            border-bottom: none;
        }

        /* 订单店铺栏 */
        .order-shop {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .shop-name {
            font-size: 13px;
            color: #5A4B40;
        }
        .shop-tag {
            font-size: 10px;
            color: #fff;
            background: #A1C895;
            padding: 1px 4px;
            border-radius: 2px;
            margin-left: 5px;
        }
        .order-status {
            font-size: 12px;
            color: #FF8800;
        }

        /* 订单商品栏 */
        .order-goods {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        .goods-img {
            width: 60px;
            height: 60px;
            border-radius: 6px;
            background: #F8F5EE;
            overflow: hidden;
        }
        .goods-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .goods-info {
            flex: 1;
        }
        .goods-name {
            font-size: 13px;
            line-height: 1.4;
            margin-bottom: 5px;
            color: #5A4B40;
        }
        .goods-spec {
            font-size: 11px;
            color: #948678;
            margin-bottom: 5px;
        }
        .goods-tip {
            font-size: 10px;
            color: #fff;
            background: #A1C895;
            padding: 1px 4px;
            border-radius: 2px;
            display: inline-block;
        }
        .goods-price {
            font-size: 14px;
            color: #5A4B40;
            font-weight: bold;
            text-align: right;
        }
        .goods-count {
            font-size: 12px;
            color: #948678;
        }

        /* 订单金额栏 */
        .order-price {
            text-align: right;
            font-size: 13px;
            margin-bottom: 10px;
        }
        .price-text {
            color: #948678;
        }
        .price-num {
            color: #5A4B40;
            font-weight: bold;
        }

        /* 物流信息栏 */
        .order-logistics {
            font-size: 12px;
            color: #948678;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* 订单操作栏 */
        .order-opt {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }
        .opt-btn {
            padding: 5px 12px;
            font-size: 12px;
            border-radius: 4px;
            border: 1px solid #D9D2C8;
            background: #fff;
            color: #948678;
            cursor: pointer;
        }
        .opt-btn.primary {
            background: #A1C895;
            color: #fff;
            border-color: #A1C895;
        }

        /* 评价模块头部 */
        .eval-header {
            background: #fff;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 8px 10px;
            border-radius: 8px 8px 0 0;
            display: none;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #F8F5EE;
            overflow: hidden;
        }
        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .user-stats {
            display: flex;
            gap: 15px;
            font-size: 12px;
            color: #948678;
        }
        .stat-num {
            font-size: 14px;
            color: #5A4B40;
            font-weight: 500;
            display: block;
        }

        /* 评价消息提醒 */
        .eval-tip {
            background: #fff;
            padding: 12px 15px;
            font-size: 14px;
            color: #5A4B40;
            border-top: 1px solid #F0EBE4;
            margin: 0 10px;
            display: none;
        }

/* ======================
✅ 最终版：超短小程序弹窗
======================= */
.cancel-modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 1000;
  display: none;
}

.modal-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
}

.modal-content {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 414px;
  background: #fff;
  border-radius: 12px 12px 0 0;
  padding-bottom: 5px; /* 减少底部留白 */
}

.modal-header {
  padding: 12px 15px; /* 减少头部上下内边距 */
  text-align: center;
  border-bottom: 1px solid #eee;
}

.modal-title {
  font-size: 15px; /* 标题字体稍小 */
  font-weight: 500;
}

.modal-close {
  display: none;
}

.reason-title {
  display: none;
}

.reason-list {
  width: 100%;
}

.reason-item {
  padding: 10px 15px; /* 大幅减少选项上下内边距 */
  text-align: center;
  border-bottom: 1px solid #f5f5f5;
  font-size: 14px; /* 选项字体稍小 */
}

.reason-item.selected {
  background: #f8f5ee;
  color: #A1C895;
}

.reason-check {
  display: none;
}

.modal-footer {
  padding: 8px 15px; /* 减少按钮区上下内边距 */
}

.modal-btn {
  width: 100%;
  padding: 10px; /* 按钮内边距减少 */
  border-radius: 6px;
  font-size: 14px; /* 按钮字体稍小 */
  border: none;
}

.modal-btn.primary {
  background: #A1C895;
  color: #fff;
}

.other-reason {
  display: none !important;
}
    </style>
</head>
<body>

<!-- 顶部导航 -->
<div class="order-header">
    <div class="back-btn" onclick="goBack()">←</div>
    <div class="header-title" id="headerTitle">我的订单</div>
</div>

<!-- 搜索栏 -->
<div class="search-bar">
    <input type="text" class="search-input" placeholder="搜索订单">
</div>

<!-- 订单标签栏 -->
<div class="order-tabs">
    <div class="tab-item" data-tab="all">全部</div>
    <div class="tab-item" data-tab="pending_payment">待付款</div>
    <div class="tab-item" data-tab="pending_share">待分享</div>
    <div class="tab-item" data-tab="pending_ship">待发货</div>
    <div class="tab-item" data-tab="pending_receive">待收货</div>
    <div class="tab-item" data-tab="evaluation">评价</div>
</div>

<!-- 优惠券提示栏 -->
<div class="coupon-tip">
    <div class="coupon-icon">⚠️</div>
    <div>你还有满10减0.5元平台券快过期，04:03:43.0</div>
</div>

<!-- 空订单区域 -->
<div class="empty-order" id="emptyOrder">
    <div class="empty-icon">📦</div>
    <div class="empty-text" id="emptyText">您还没有相关的订单</div>
    <div class="empty-link">没找到订单？试试<a href="#" onclick="switchToTab('all')">查看全部</a>或<a href="#">查看帮助</a></div>
</div>

<!-- 评价模块 -->
<div class="eval-header" id="evalHeader">
    <div class="user-info">
        <div class="avatar">
            <img src="/images/user/default-avatar.jpg" alt="头像">
        </div>
        <div class="user-stats">
            <div>
                <span class="stat-num">46</span>
                已评价
            </div>
            <div>
                <span class="stat-num">-</span>
                我赞过
            </div>
            <div>
                <span class="stat-num">3</span>
                获赞
            </div>
            <div>
                <span class="stat-num">-</span>
                获评论
            </div>
        </div>
    </div>
</div>
<div class="eval-tip" id="evalTip">评价消息提醒</div>

<!-- 订单列表 -->
<div class="order-list" id="orderList">
    <!-- 订单项将通过JavaScript动态生成 -->
</div>

<!-- 取消订单小组件（最终超短版） -->
<div id="cancelOrderModal" class="cancel-modal">
  <div class="modal-overlay" onclick="closeCancelModal()"></div>
  <div class="modal-content" onclick="event.stopPropagation()">
    <div class="modal-header">
      <div class="modal-title">请选择取消原因</div>
    </div>

    <div class="reason-list">
      <div class="reason-item" onclick="selectReason(this, '不想买了')">不想买了</div>
      <div class="reason-item" onclick="selectReason(this, '信息填错')">信息填写错误</div>
      <div class="reason-item" onclick="selectReason(this, '重新下单')">重新下单</div>
    </div>

    <div class="modal-footer">
      <button class="modal-btn primary" id="confirmCancelBtn" onclick="confirmCancelOrder()">确认取消</button>
    </div>
  </div>
</div>

<script>
    let currentTab = 'all';
    let ordersData = [];

    // 页面加载完成后执行
    document.addEventListener('DOMContentLoaded', function() {
        const urlParams = new URLSearchParams(window.location.search);
        const tab = urlParams.get('tab') || 'all';
        initPage(tab);
        loadOrders();
    });

    // 初始化页面
    function initPage(tab) {
        currentTab = tab;
        const headerTitle = document.getElementById('headerTitle');
        const tabTitles = {
            'all': '我的订单',
            'pending_payment': '待付款',
            'pending_share': '待分享',
            'pending_ship': '待发货',
            'pending_receive': '待收货',
            'evaluation': '评价'
        };
        headerTitle.textContent = tabTitles[tab] || '我的订单';

        const tabItems = document.querySelectorAll('.tab-item');
        tabItems.forEach(item => {
            item.classList.remove('active');
            if (item.dataset.tab === tab) item.classList.add('active');
        });
        updateContentDisplay(tab);
    }

    // 更新内容显示
    function updateContentDisplay(tab) {
        const emptyOrder = document.getElementById('emptyOrder');
        const orderList = document.getElementById('orderList');
        const evalHeader = document.getElementById('evalHeader');
        const evalTip = document.getElementById('evalTip');

        emptyOrder.style.display = 'none';
        orderList.style.display = 'block';
        evalHeader.style.display = 'none';
        evalTip.style.display = 'none';

        if (tab === 'pending_share') {
            emptyOrder.style.display = 'block';
            orderList.style.display = 'none';
        } else if (tab === 'evaluation') {
            evalHeader.style.display = 'block';
            evalTip.style.display = 'block';
        }
    }

    // 加载订单
    function loadOrders() {
        ordersData = JSON.parse(localStorage.getItem('pdd_orders') || '[]');
        const pendingPaymentOrder = JSON.parse(localStorage.getItem('pdd_pending_payment') || 'null');
        if (pendingPaymentOrder) {
            ordersData.unshift(pendingPaymentOrder);
            localStorage.setItem('pdd_orders', JSON.stringify(ordersData));
            localStorage.removeItem('pdd_pending_payment');
        }

        ordersData = ordersData.filter(order => {
            return order.productName && (
                order.productName.includes('绿豆糕') || 
                order.productName.includes('绿豆饼') ||
                order.productName.includes('桃山月饼')
            );
        });
        localStorage.setItem('pdd_orders', JSON.stringify(ordersData));

        if (ordersData.length === 0) {
            document.getElementById('emptyOrder').style.display = 'block';
            document.getElementById('orderList').style.display = 'none';
            return;
        }
        renderOrders();
    }

    // 渲染订单
    function renderOrders() {
        const orderList = document.getElementById('orderList');
        const filteredOrders = ordersData.filter(order => currentTab === 'all' || order.status === currentTab);
        if (filteredOrders.length === 0) { orderList.innerHTML = ''; return; }

        orderList.innerHTML = '';
        filteredOrders.forEach(order => {
            const item = document.createElement('div');
            item.className = 'order-item';
            item.dataset.orderId = order.id;
            item.innerHTML = `
                <div class="order-shop">
                    <div class="shop-name">${order.shopName}${order.shopTag ? `<span class="shop-tag">${order.shopTag}</span>` : ''}</div>
                    <div class="order-status">${order.statusText}</div>
                </div>
                <div class="order-goods">
                    <div class="goods-img"><img src="${order.image}" alt=""></div>
                    <div class="goods-info">
                        <div class="goods-name">${order.productName}</div>
                        <div class="goods-spec">${order.spec}</div>
                        <div class="goods-tip">7天无理由退货</div>
                        <div class="goods-price">¥${order.price} <span class="goods-count">×${order.quantity}</span></div>
                    </div>
                </div>
                <div class="order-price">
                    <span class="price-text">实付：</span><span class="price-num">¥${order.total}</span><span class="price-text"> (免运费)</span>
                </div>
                <div class="order-opt">
                    <button class="opt-btn">更多</button>
                    ${order.status === 'pending_payment' ? '<button class="opt-btn" onclick="showCancelModal('+order.id+')">取消订单</button><button class="opt-btn primary">立即支付</button>' : ''}
                </div>
            `;
            orderList.appendChild(item);
        });
    }

    // 取消订单逻辑
    let currentCancelOrderId = null;
    let selectedReason = '';

    function showCancelModal(orderId) {
        currentCancelOrderId = orderId;
        selectedReason = '';
        document.querySelectorAll('.reason-item').forEach(i => i.classList.remove('selected'));
        document.getElementById('confirmCancelBtn').disabled = true;
        document.getElementById('cancelOrderModal').style.display = 'flex';
    }

    function closeCancelModal() {
        document.getElementById('cancelOrderModal').style.display = 'none';
    }

    function selectReason(el, reason) {
        document.querySelectorAll('.reason-item').forEach(i => i.classList.remove('selected'));
        el.classList.add('selected');
        selectedReason = reason;
        document.getElementById('confirmCancelBtn').disabled = false;
    }

    function confirmCancelOrder() {
        if (!currentCancelOrderId || !selectedReason) return alert('请选择原因');
        let orders = JSON.parse(localStorage.getItem('pdd_orders') || '[]');
        orders = orders.filter(o => o.id != currentCancelOrderId);
        localStorage.setItem('pdd_orders', JSON.stringify(orders));
        closeCancelModal();
        loadOrders();
        alert('订单已取消：' + selectedReason);
    }

    // 标签切换
    function switchToTab(tab) { initPage(tab); renderOrders(); }
    document.querySelectorAll('.tab-item').forEach(t => t.addEventListener('click', () => switchToTab(t.dataset.tab)));

    // 返回
    function goBack() { window.history.back(); }
</script>

</body>
</html>
