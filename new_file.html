<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0">
    <title>手工绿豆糕商城</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "PingFang SC", "Helvetica Neue", sans-serif;
            background: #FDFBF5; /* 浅米白 —— 轻养生底色 */
            max-width: 414px;
            margin: 0 auto;
            padding-bottom: 60px;
            color: #333;
        }

        /* 顶部 LOGO 栏 */
        .top-header {
            background: #ffffff;
            padding: 12px 15px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid #f0f0f0;
        }

        .logo-icon {
            font-size: 20px;
            color: #A1C895; /* 低饱和豆绿色 */
        }

        .logo-text {
            font-size: 16px;
            font-weight: 500;
            color: #5A4B40; /* 暖棕 —— 烘焙质感 */
        }

        /* 搜索栏 */
        .search-bar {
            background: #ffffff;
            padding: 10px 15px;
        }

        .search-box {
            background: #F5F5F0;
            border-radius: 20px;
            padding: 8px 15px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .search-box span {
            color: #999;
            font-size: 14px;
        }

        .search-box input {
            flex: 1;
            border: none;
            background: transparent;
            outline: none;
            font-size: 14px;
            color: #666;
        }

        /* 横幅 */
        .banner {
            background: linear-gradient(to right, #E8F3E1, #FDFBF5);
            height: 120px;
            margin: 10px 15px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #5A4B40;
            font-size: 16px;
            font-weight: 500;
        }

        /* 商品标题 */
        .goods-title {
            padding: 0 15px;
            margin: 10px 0;
            font-size: 15px;
            color: #5A4B40;
            font-weight: 500;
        }

        /* 商品网格 */
        .goods-grid {
            display: flex;
            flex-wrap: wrap;
            padding: 0 10px;
            gap: 8px;
        }

        .goods-item {
            width: 48%;
            background: #ffffff;
            border-radius: 10px;
            overflow: hidden;
        }

        .goods-img {
            width: 100%;
            height: 130px;
            background: #F8F5EE;
        }

        .goods-info {
            padding: 10px;
        }

        .goods-name {
            font-size: 13px;
            color: #333;
            line-height: 1.4;
            margin-bottom: 4px;

            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .goods-price {
            font-size: 15px;
            color: #A1C895; /* 豆绿色价格 */
            font-weight: 600;
        }

        .goods-sale {
            font-size: 11px;
            color: #999;
            margin-top: 2px;
        }

        /* 底部导航 */
        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 414px;
            height: 55px;
            background: white;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #eee;
        }

        .tab-item {
            text-align: center;
            font-size: 11px;
            color: #666;
        }

        .tab-item.active {
            color: #A1C895; /* 豆绿色激活 */
        }

        .tab-icon {
            font-size: 20px;
            margin-bottom: 2px;
        }
    </style>
</head>

<body>

    <!-- 顶部 LOGO 栏 -->
    <div class="top-header">
        <div class="logo-icon">🍃</div>
        <div class="logo-text">手工绿豆糕商城</div>
    </div>

    <!-- 搜索栏 -->
    <div class="search-bar">
        <div class="search-box">
            <span>🔍</span>
            <input type="text" placeholder="搜索绿豆糕口味、礼盒、规格">
        </div>
    </div>

    <!-- 横幅 -->
    <div class="banner">
        纯手工 · 无添加 · 轻养生绿豆糕
    </div>

    <!-- 商品标题 -->
    <div class="goods-title">精选推荐</div>

    <!-- 商品列表 -->
    <div class="goods-grid">
        <div class="goods-item">
            <div class="goods-img"></div>
            <div class="goods-info">
                <div class="goods-name">原味绿豆糕 纯手工无添加 传统糕点</div>
                <div class="goods-price">¥29.9</div>
                <div class="goods-sale">已售1.2万+</div>
            </div>
        </div>

        <div class="goods-item">
            <div class="goods-img"></div>
            <div class="goods-info">
                <div class="goods-name">抹茶绿豆糕 清新茶香 独立包装</div>
                <div class="goods-price">¥32.9</div>
                <div class="goods-sale">已售8900+</div>
            </div>
        </div>

        <div class="goods-item">
            <div class="goods-img"></div>
            <div class="goods-info">
                <div class="goods-name">桂花绿豆糕 桂花香浓 礼盒装</div>
                <div class="goods-price">¥34.9</div>
                <div class="goods-sale">已售6500+</div>
            </div>
        </div>

        <div class="goods-item">
            <div class="goods-img"></div>
            <div class="goods-info">
                <div class="goods-name">绿豆糕礼盒 混合口味 送礼佳品</div>
                <div class="goods-price">¥68.0</div>
                <div class="goods-sale">已售4300+</div>
            </div>
        </div>
    </div>

    <!-- 底部导航 -->
    <div class="tab-bar">
        <div class="tab-item active">
            <div class="tab-icon">🏠</div>
            <div>首页</div>
        </div>
        <div class="tab-item">
            <div class="tab-icon">📦</div>
            <div>分类</div>
        </div>
        <div class="tab-item">
            <div class="tab-icon">❤️</div>
            <div>收藏</div>
        </div>
        <div class="tab-item">
            <div class="tab-icon">👤</div>
            <div>我的</div>
        </div>
    </div>

</body>
</html>
